<!DOCTYPE html>
<html>
<head>
  <title>Sorting Visualizer</title>
  <style>
    body {
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    #vis-123456 {
      height: 200px;
      display: flex;
      align-items: flex-end;
      position: relative;
      border: 1px solid #ccc;
      padding: 5px;
    }

    .bar {
      width: 7px;
      background-color: black;
      margin: 0 1px;
    }

    #motorcycle {
      position: absolute;
      font-size: 22px;
      transition: left 0.1s linear, bottom 0.1s linear;
      transform: scaleX(-1); /* Flip motorcycle so it faces right */
    }
  </style>
</head>

<body>

<h1>Sorting Visualizer</h1>

<input type="range" id="speedSlider" min="10" max="300" value="100">

<div id="vis-123456"></div>

<script>

const count = 50;
const array = new Array(count);
let speed = 100;

const slider = document.getElementById("speedSlider");
slider.oninput = function () {
  speed = Number(this.value);
};

// Generate random values
for (let i = 0; i < count; i++) {
  array[i] = Math.random();
}

// Create bars
const visualizer = document.getElementById("vis-123456");

for (let i = 0; i < array.length; i++) {
  const bar = document.createElement("div");
  bar.classList.add("bar");
  bar.style.height = array[i] * 100 + "%";
  visualizer.appendChild(bar);
}

// Create motorcycle
const moto = document.createElement("div");
moto.id = "motorcycle";
moto.textContent = "🏍️";
moto.style.left = "0px";
moto.style.bottom = "0px";
visualizer.appendChild(moto);

// Update bar heights
function updateBars() {
  const bars = document.getElementsByClassName("bar");

  for (let i = 0; i < bars.length; i++) {
    bars[i].style.height = array[i] * 100 + "%";
  }
}

// Bubble Sort
async function bubbleSort(arr) {

  let swapped;

  do {
    swapped = false;

    for (let i = 1; i < arr.length; i++) {

      if (arr[i - 1] > arr[i]) {

        let temp = arr[i - 1];
        arr[i - 1] = arr[i];
        arr[i] = temp;

        swapped = true;

        updateBars();

        await new Promise(resolve => setTimeout(resolve, speed));
      }
    }

  } while (swapped);

  await driveMotorcycle();
}

// Motorcycle animation
async function driveMotorcycle() {

  const bars = document.getElementsByClassName("bar");
  const barWidth = bars[0].offsetWidth + 2;

  for (let i = 0; i < bars.length; i++) {

    const bar = bars[i];

    const leftPos = i * barWidth;
    const barHeight = bar.offsetHeight;

    moto.style.left = leftPos + "px";
    moto.style.bottom = (barHeight + 5) + "px";

    await new Promise(resolve => setTimeout(resolve, 50));
  }
}

bubbleSort(array);

</script>

</body>
</html>
