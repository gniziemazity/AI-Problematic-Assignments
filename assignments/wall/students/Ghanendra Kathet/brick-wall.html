<!DOCTYPE html>
<html>
    <head>
        <title>Brick-Wall</title>
        <style>
            /*styling by ID */
            #Brick-Wall {
                width: 375px;
                display: flex;
                flex-wrap: wrap;
                
            }
            /*CSS style*/
            .cell{
                height: 40px;
                width: 50px; 
                /* commented styling - not in use - just an example of how to comment in CSS 
                margin: 10px;
                padding: 5px;
                */
                border: 2.5px solid grey;
                box-sizing: border-box; /* size includes padding and border */
                border-radius: 4px;

            }
            .light{
                background-color: rgb(234,64,13);
            }
            .dark{
                background-color: rgb(173,44,5);
            }
            .half-width{
                width : 25px;
            }

        </style>
    </head>

    <body>
        <h1>Brick-Wall</h1>
        

        <div id="Brick-Wall">
            <!-- Row_1 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row_2 -->
            <div class="cell light half-width"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row_3 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row_4 -->
            <div class="cell light half-width"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row_5 -->
            <div class="cell light "></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row_6 -->
            <div class="cell light half-width"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <!-- Row_7 -->
            <div class="cell light "></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row_8 -->
            <div class="cell dark light half-width"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>


        </div>

    
    </body>
</html>
