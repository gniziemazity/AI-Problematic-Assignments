<!DOCTYPE html>
<html>
    <head>
        <title>Chess Board</title>
        <style>
            /*styling by ID */
            #chess-board {
                width: 400px;
                display: flex;
                flex-wrap: wrap;
                
            }
            /*CSS style*/
            .cell{
                height: 50px;
                width: 50px; 
                background-color: black;
                /* commented styling - not in use - just an example of how to comment in CSS 
                margin: 10px;
                padding: 5px;
                */
                border: 0.5px solid grey;
                display: inline-block;

                box-sizing: border-box; /* size includes padding and border */

            }
            .light{
                background-color: white;
            }
            .dark{
                background-color: black;
            }

        </style>
    </head>

    <body>
