<script>
const container = document.getElementById("container"); // Container for single animals
const catSound = new Audio("cat-meow.mp3"); // Cat sound https://pixabay.com/sound-effects/nature-cute-cat-meow-400946/
const dogSound = new Audio("dog-bark.mp3"); // Dog sound https://pixabay.com/sound-effects/nature-free-dog-bark-419014/



const cat = new Cat("Mimi", 3, "gray", "green", "pink");
container.appendChild(cat.render());

/*  VARIANT 1 
fetch("https://radufromfinland.com/animals/")   // This sends a request to the server to get animal data
    .then(function(response) {                  // This runs when the server responds
        return response.json();                 // This converts the response into JSON format
    })
    .then(function(data) {                      // This runs after JSON conversion is complete
        console.log(data);                      // This prints the received data in the console
    })
    .catch(function(err) {                      // This runs if an error happens
        console.error(err);                     // This prints the error in the console
    });
*/

// Variant 2 
async function fetchData() {                    
    // This creates an asynchronous function to get data from the server using await

    try {
        const response = await fetch("https://radufromfinland.com/animals/"); 
        // This waits for the server to send a response

        const data = await response.json();    
        // This converts the server response into JSON format

        console.log(data);                    
        // This displays the received data in the browser console

        const grid = document.getElementById("grid"); 
        // This gets the HTML element where all animals will be displayed

        for (let i = 0; i < 100; i++) {
            // This loop runs 100 times to create 100 animals

            const div = document.createElement("div");
            // This creates a new div element for each animal

            div.classList.add("animal");
            // This adds a CSS class to style each animal box

            const isCat = Math.random() < 0.5;
            // This randomly decides whether the animal will be a cat or a dog

            let canvas, animal;
            // These variables will store the animal object and its drawing

            if (isCat) {
                // If the random choice is cat

                const catColors = ["white","orange","black","pink","cream"];
                const eyeColors = ["brown","yellow","blue"];
                const earColors = ["pink","brown","peach"];
                // These arrays store possible colors for the cat

                animal = new Cat(
                    "Cat" + i,
                    Math.floor(Math.random()*10)+1,
                    catColors[Math.floor(Math.random()*catColors.length)],
                    eyeColors[Math.floor(Math.random()*eyeColors.length)],
                    earColors[Math.floor(Math.random()*earColors.length)]
                );
                // This creates a new Cat object with random properties

                canvas = animal.render();
                // This draws the cat on a canvas
            } else {
                // If the random choice is dog

                const dogColors = ["brown","black","Pink","golden"];
                const eyeColors = ["green","blue","yellow"];
                // These arrays store possible colors for the dog

                animal = new Dog(
                    "Dog" + i,
                    Math.floor(Math.random()*12)+1,
                    dogColors[Math.floor(Math.random()*dogColors.length)],
                    eyeColors[Math.floor(Math.random()*eyeColors.length)]
                );
                // This creates a new Dog object with random properties

                canvas = animal.render();
                // This draws the dog on a canvas
            }

            div.appendChild(canvas);
            // This adds the canvas (animal drawing) into the div

            grid.appendChild(div);
            // This adds the div into the grid layout

            canvas.onclick = function() {
                // This runs when the user clicks on the animal

                animal.talk();
                // This calls the talk method of the animal (Meow or Woof)

                if (isCat) catSound.play(); 
                else dogSound.play();
                // This plays the correct sound depending on the animal type
            };
        }
        

    } catch(err) {                            
        // This runs if any error occurs during fetching or processing

        console.error(err);                   
        // This prints the error in the console
    }
}

fetchData(); 
// This calls the function so the code runs and animals are displayed
</script>
