<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson</title>

    <style>
        body {
            background-color: lightblue;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="container">
        My first Emmet abbreviations:
        <ol>
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol>li*3 (ordered list)</li>
        </ol>
    </div>

    <script src="cat.js"></script>

    <script>
        const container = document.getElementById("container");
        let myNumber = 67.67;
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        const Hello = 55;
        console.log(Hello);

        let myBoolean = true;
        let oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        myBoolean = false; 
        oppositeBoolean = !myBoolean;
        console.log(myBoolean,oppositeBoolean);

        const myArray = [1, 2, 3];
        console.log(myArray);

        const anotherCat = new Cat("rex" , 7, "brown", "black");
        anotherCat.talk();
        container.appendChild(anotherCat.render());

        fetch("https://radufromfinland.com/animals/") // request API
            .then(function(response) { // when response arrives
                return response.json(); // convert to JSON
            })
            .then(function(data) { // when JSON ready
                console.log(data); // print data
                generateAnimals(data); // create animals
            })
            .catch(function(err) { // error handling
                console.error(err);
            });

        /*
        async function fetchData() {
            try {

                console.log(data);
                generateAnimals(data);
            } catch(err) {
                console.error(err);
            }
        }
        fetchData();
        */

        function generateAnimals(data) {

            container.style.display = "grid";
            container.style.gridTemplateColumns = "repeat(4, 1fr)";
            container.style.gap = "10px";

            const colors = ["black", "white", "gray", "brown", "orange"];
            const eyeColors = ["blue", "green", "brown", "black"];

            for (let i = 0; i < 100; i++) {

                const animal = data[Math.floor(Math.random() * data.length)];

                const name = animal.name || "Animal";
                const age = Math.floor(Math.random() * 10) + 1;

                const furr = colors[Math.floor(Math.random() * colors.length)];
                const eyes = eyeColors[Math.floor(Math.random() * eyeColors.length)];

                let animalObj;

                if (Math.random() < 0.5) {
                    animalObj = new Cat(name, age, furr, eyes);
                } else {
                    animalObj = new Dog(name, age, furr, eyes);
                }

                const canvas = animalObj.render(250);
                container.appendChild(canvas);
            }
        }
    </script>
</body>
</html>
