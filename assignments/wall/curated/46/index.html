<!DOCTYPE html>
<html>
<head>
    <title>Chess Board</title>
    <style>
        /* styling by ID */
        #chess-board {
            width: 425px;
            display: flex;
            flex-wrap: wrap;
        }

        /* CSS class */
        .cell {
            height: 35px;
            width: 50px;
            border: 3px solid gray;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .light {
            background-color: red;
        }

        .dark {
            background-color: darkred;
        }
        .half-width {
    width: 25px;
}
    </style>
</head>
<body>

    <h1>Chess Board</h1>

    <div id="chess-board">

        <!-- Row 1 -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 2 -->
         <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell light half-width"></div>

        <!-- Row 3 -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 4 -->
         <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell light half-width"></div>


        <!-- Row 5 -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 6 -->
         <div class="cell light half-width"></div>
        <div class="cell dark"></div>

        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <div class="cell light half-width"></div>


        <!-- Row 7 -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 8 -->
         <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>

        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell light half-width"></div>


    </div>

</body>
</html>
