<!--
The chess board looks correct and the pieces can be moved by clicking as expected.
However, it is not a complete chess game because there are no rules implemented, 
any pawn can remove the king or queen as well.
There is no turn system, move validation, or check/checkmate detection.
-->
<!DOCTYPE html>

            .dark  { background-color: #769656;  }

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr); /* 1 fraction */
                grid-template-columns: repeat(8, 1fr);
            }

            img {
                width: 40%; /* i decreased the width of the image so it will 
                fit perfectly in the square and it wont look uneven */
            }
            .invert-color {
                filter: invert(100%) drop-shadow(0px 0px 4px black);

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            // method 5
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
