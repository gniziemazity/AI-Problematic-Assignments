but has a problem:  movement is free and not by real chess rules.Players can move any piece . -->

<!DOCTYPE html>
<html>
<head>
    <title> chess Game ( 123456 - XXX )</title>
    <style>
        .cell  { 
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center; 
        }


        .light { background-color: white; }
        .dark  { background-color: gray;  }

        #chess-board {
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
        }
        
        img {
            width: 65%;/* changing the size for look better ( Q4)  */
            cursor: pointer;
            user-select: none;
        }

        .invert-color {
            filter: invert(100%);
        }
    </style>
</head>
<body>
    <h1>Chess Game(movement is free- no  real chess rules ) </h1>

    <div id="chess-board">
        <!-- Row 0– Black piece -->
        <div class="cell light"><img src="p2.png"/></div>
        <div class="cell dark"><img src="p5.png"/></div>
        <div class="cell light"><img src="p6.png"/></div>
        <div class="cell dark"><img src="p3.png"/></div>
        <div class="cell light"><img src="p4.png"/></div>
        <div class="cell dark"><img src="p6.png"/></div>
        <div class="cell light"><img src="p5.png"/></div>
        <div class="cell dark"><img src="p2.png"/></div>

        <!-- Row 1- Black pawn -->
        <div class="cell dark"><img src="p1.png"/></div>
        <div class="cell light"><img src="p1.png"/></div>
        <div class="cell dark"><img src="p1.png"/></div>
        <div class="cell light"><img src="p1.png"/></div>
        <div class="cell dark"><img src="p1.png"/></div>
        <div class="cell light"><img src="p1.png"/></div>
        <div class="cell dark"><img src="p1.png"/></div>
        <div class="cell light"><img src="p1.png"/></div>

        <!-- Row 2to 5  is  all empty -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>

        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>

        <!-- Row 6 –White pawn( I do not have white to show but add (Q1)) -->

        <div class="cell dark"><img src="p7.png"/></div>

        <div class="cell light"><img src="p11.png"/></div>

        <div class="cell light"><img src="p8.png"/></div>
    </div>

    <script>
        let selectedPiece = null;
        const cells = document.getElementsByClassName("cell");

        // method 5 -(Q3 )= 5
        for (const cell of cells) {
            cell.onclick = function () {
                handleClick(cell);
            };
        }

        function handleClick(element) {
            // for Clear the selected border  
            for (const cell of cells) {
                cell.style.border = "2px solid black";
            }

            
            if (selectedPiece != null) {
                element.replaceChildren(selectedPiece);
                selectedPiece = null;
            } else if (element.children.length > 0) {
                selectedPiece = element.children[0];
                element.style.border = "4px solid red";
            }
        }
    </script>
</body>
