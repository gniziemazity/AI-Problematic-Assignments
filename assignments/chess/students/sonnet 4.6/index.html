<!-- 
    PROBLEM REPORT (Assignment Question 2):
    There is a bug in the move logic: when you select a piece and click 
    another cell that already contains a piece, replaceChildren() replaces 
    ALL children of the target cell with the moved piece — which works 
    correctly for capturing. However, after moving a piece, the border 
    highlight is cleared for ALL cells via the loop, but the selectedPiece 
    variable is set to null WITHOUT clearing the red border on the originally 
    selected cell first (since the loop runs before the move). More importantly, 
    clicking an empty cell when no piece is selected does nothing (correct), 
    but clicking the same piece twice does NOT deselect it — you must click 
    another cell to cancel. The biggest functional issue: there is NO move 
    validation at all, so any piece can move anywhere, which is not real chess.
-->
<!DOCTYPE html>
<html>
    <head>
        <title>Chess 123456</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

            body {
                background-color: #1a1a2e;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 30px;
                font-family: 'Cinzel', serif;
                color: #e0c97f;
            }

            h1 {
                font-size: 2.2rem;
                letter-spacing: 0.15em;
                margin-bottom: 20px;
                text-shadow: 0 0 18px #e0c97f88;
            }

            #board-wrapper {
                padding: 14px;
                background: linear-gradient(135deg, #3b2a1a 0%, #5c3d1e 50%, #3b2a1a 100%);
                border-radius: 6px;
                box-shadow: 0 8px 40px #00000099, 0 0 0 3px #e0c97f55;
            }

            .cell {
                border: 1px solid #00000033;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: filter 0.15s;
            }

            .cell:hover {
                filter: brightness(1.15);
            }

            .light { background-color: #f0d9b5; }
            .dark  { background-color: #b58863; }

            #chess-board {
                width: 480px;
                height: 480px;
                display: grid;
                grid-template-rows: repeat(8, 1fr);
                grid-template-columns: repeat(8, 1fr);
            }

            img {
                width: 78%;
                pointer-events: none;
                user-select: none;
                filter: drop-shadow(1px 2px 3px #00000066);
            }

            .invert-color {
                filter: invert(100%) drop-shadow(1px 2px 3px #00000088);
            }

            .selected {
                outline: 3px solid #e63946;
                outline-offset: -3px;
                background-color: #e6394644 !important;
            }

            #status {
                margin-top: 16px;
                font-size: 1rem;
                letter-spacing: 0.08em;
                color: #e0c97faa;
                min-height: 1.4em;
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>

        <div id="board-wrapper">
            <div id="chess-board">
                <!-- Row 8 (rank 8) — Black back rank -->
                <div class="cell dark"><img src="pieces/p4.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p3.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p2.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p1.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p5.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p2.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p3.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p4.png" class="invert-color"/></div>

                <!-- Row 7 (rank 7) — Black pawns -->
                <div class="cell light"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell light"><img src="pieces/p6.png" class="invert-color"/></div>
                <div class="cell dark"><img src="pieces/p6.png" class="invert-color"/></div>

                <!-- Rows 6–3 — Empty squares -->
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>

                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>

                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>

                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>

                <!-- Row 2 (rank 2) — White pawns -->
                <div class="cell dark"><img src="pieces/p6.png"/></div>
                <div class="cell light"><img src="pieces/p6.png"/></div>
                <div class="cell dark"><img src="pieces/p6.png"/></div>
                <div class="cell light"><img src="pieces/p6.png"/></div>
                <div class="cell dark"><img src="pieces/p6.png"/></div>
                <div class="cell light"><img src="pieces/p6.png"/></div>
                <div class="cell dark"><img src="pieces/p6.png"/></div>
                <div class="cell light"><img src="pieces/p6.png"/></div>

                <!-- Row 1 (rank 1) — White back rank -->
                <div class="cell light"><img src="pieces/p4.png"/></div>
                <div class="cell dark"><img src="pieces/p3.png"/></div>
                <div class="cell light"><img src="pieces/p2.png"/></div>
                <div class="cell dark"><img src="pieces/p1.png"/></div>
                <div class="cell light"><img src="pieces/p5.png"/></div>
                <div class="cell dark"><img src="pieces/p2.png"/></div>
                <div class="cell light"><img src="pieces/p3.png"/></div>
                <div class="cell dark"><img src="pieces/p4.png"/></div>
            </div>
        </div>

        <div id="status">Select a piece to move</div>

        <script>
            let selectedPiece = null;
            let selectedCell = null;

            const cells = document.getElementsByClassName("cell");
            const status = document.getElementById("status");

            // method 8
            for (const cell of cells) {
                cell.onclick = function () {
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                // Clear all highlights
                for (const cell of cells) {
                    cell.classList.remove("selected");
                }

                if (selectedPiece != null) {
                    if (element === selectedCell) {
                        // Clicked same cell — deselect
                        selectedCell.appendChild(selectedPiece);
                        selectedPiece = null;
                        selectedCell = null;
                        status.textContent = "Select a piece to move";
                    } else {
                        // Move piece to new cell
                        element.replaceChildren(selectedPiece);
                        selectedPiece = null;
                        selectedCell = null;
                        status.textContent = "Select a piece to move";
                    }
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    selectedCell = element;
                    element.classList.add("selected");
                    status.textContent = "Piece selected — click destination";
                }
            }
        </script>
    </body>
</html>
