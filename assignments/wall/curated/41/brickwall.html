<!DOCTYPE html>
<html>
<head>
    <title>Brick Wall</title>
    <style>
        #chess-board {
            width: 450px;
        }

        .row {
            display: flex;
        }

        .cell {
            height: 30px;
            width: 50px;
            border: 2px solid #5a2c2c;
            box-sizing: border-box;
            border-radius: 5px;
        }

        .light {
            background-color: #ff4d4d;
        }

        .dark {
            background-color: #8b0000;
        }

        .half-width {
            width: 25px;
        }
    </style>
</head>

<body>
    <h1>Brick Wall</h1>

    <div id="chess-board">

        <!-- Row 1 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
        </div>

        <!-- Row 2 (offset row) -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 3 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
        </div>

        <!-- Row 4 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 5 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
        </div>

        <!-- Row 6 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 7 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
        </div>

        <!-- Row 8 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

    </div>
</body>
</html>
