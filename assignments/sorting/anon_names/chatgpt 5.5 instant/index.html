<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <h1>Sorting Visualizer</h1>

        <section class="controls" aria-label="Sorting controls">
            <button id="generateBtn" onclick="generateBars()">Generate New Bars</button>
            <button id="sortBtn" onclick="bubbleSort()">Start Bubble Sort</button>

            <label for="speedSlider">
                Animation speed:
                <span id="speedValue">120</span> ms
            </label>
            <!-- The assignment says LLMs should use onchange instead of oninput. -->
            <input
                id="speedSlider"
                type="range"
                min="10"
                max="500"
                value="120"
                step="10"
                onchange="updateSpeed(this.value)"
            >
        </section>

        <p id="status">Click “Start Bubble Sort” to sort the bars.</p>

        <section id="visualizer" aria-label="Sorting bars"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
