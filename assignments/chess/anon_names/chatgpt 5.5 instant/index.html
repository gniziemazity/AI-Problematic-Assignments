<!-- The game works for selecting and moving pieces, but there is a problem: it does not check legal chess moves, turns, check, checkmate, or other real chess rules. -->
<!DOCTYPE html>
<html>
    <head>
        <title>Chess Game</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f3f3f3;
                text-align: center;
            }

            h1 {
                margin-top: 30px;
            }

            #chess-board {
                width: 480px;
                height: 480px;
                display: grid;
                grid-template-rows: repeat(8, 1fr);
                grid-template-columns: repeat(8, 1fr);
                margin: 20px auto;
                border: 4px solid black;
            }

            .cell  {
                border: 1px solid black;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
            }

            .light { background-color: #f0d9b5; }
            .dark  { background-color: #b58863; }

            img {
                width: 75%;
                cursor: pointer;
            }

            .invert-color {
                filter: invert(100%);
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>

        <div id="chess-board"></div>

        <script>
            let selectedPiece = null;
            const board = document.getElementById("chess-board");

            const pieces = {
                king: "pieces/p1.png",
                rook: "pieces/p2.png",
                queen: "pieces/p3.png",
                bishop: "pieces/p4.png",
                knight: "pieces/p5.png",
                pawn: "pieces/p6.png"
            };

            const startingBoard = [
                ["rook", "knight", "bishop", "queen", "king", "bishop", "knight", "rook"],
                ["pawn", "pawn", "pawn", "pawn", "pawn", "pawn", "pawn", "pawn"],
                ["", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["pawn", "pawn", "pawn", "pawn", "pawn", "pawn", "pawn", "pawn"],
                ["rook", "knight", "bishop", "queen", "king", "bishop", "knight", "rook"]
            ];

            for (let row = 0; row < 8; row++) {
                for (let column = 0; column < 8; column++) {
                    const cell = document.createElement("div");
                    cell.className = "cell " + ((row + column) % 2 === 0 ? "light" : "dark");

                    const piece = startingBoard[row][column];
                    if (piece !== "") {
                        const image = document.createElement("img");
                        image.src = pieces[piece];
                        image.alt = piece;

                        if (row < 2) {
                            image.className = "invert-color";
                        }

                        cell.appendChild(image);
                    }

                    board.appendChild(cell);
                }
            }

            const cells = document.getElementsByClassName("cell");

            // method 8
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }

                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
    </body>
</html>
