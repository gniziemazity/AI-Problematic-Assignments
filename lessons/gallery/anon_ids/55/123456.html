    <!DOCTYPE html> <!-- use ! then tab -->
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript Lesson</title>
    </head>
    <body>
        <div id="container"> <!-- div#container -->
            My first Emmet abbreviations:
            <ol> <!-- ol>li*3 -->
                <li>! (HTML boilerplate)</li>
                <li>div#containter(div with id)</li>
                <li>ol>li*3 (ordered list with 3 item)</li>
            </ol>
            (all followed by Tab/ Enter)
        </div>
        
        <script src = "https://www.radufromfinland.com/dog.js"></script>
        <script>
            myNumber = 67.67; // never define without const, let (or var) 
            console.log(myNumber);

            const myString = "I study at Academy";
            console.log(myString);

            const Hello = 55;
            console.log(Hello);

            let myBoolean = true;
            var oppositeBoolean = !myBoolean //var was "replaced" by let and const
            console.log(myBoolean, oppositeBoolean); //accepts multiple parameters // this is gonna show in the console true false cause myBoolean = true and oppositeBoolean = false
            
            myBoolean = false; 
            oppositeBoolean = !myBoolean;
            console.log(myBoolean,oppositeBoolean); //swap the true and false

            console.log(!42, !"ABC", ![]); // there is something there but if u ! (negate them) it will become false
            console.log(!null, !undefined, !0); //the value here is also false so now they will be turn to true and 0 is "falsy"

            //array are like python list
            const myArray = [1, 2, 3, 4, 5, "XXX", true, null];
            myArray.length = 0 //changing the length of the array it will get rid of the array behiend
            myArray[0]= 9
            myArray[1]= 8
            myArray[2]= 7
            //myArray = [1,2,3] cant re asign it cause this is a const and this will crash
            try { //like try in python
                myArray = [1,2,3];
            }
            catch(err){
                console.error(err);
            }
            myArray.push(6); //add 6 in the list
            myArray.push(11); 
            myArray.sort(function(a,b){return a - b}); //function(a,b){return a - b} helps sort 11
            console.log(myArray);

            // objects are like python dictionaries
            const dog = {
                name: "Max",
                age: 5,
                furr: "black",
                eyes: "brown",
            };
            console.log(dog);
            console.table(dog);
            console.log(dog.name);
            dog.name = "Charlie"
            console.log(dog["name"]);

            const anotherDog = new Dog("rex" , 7, "brown", "black");
            console.log(anotherDog)
            anotherDog.talk();
            
            const canvas = anotherDog.render();
            container.appendChild(canvas);
            /* no need for document.getElementById("container") ids that are valid JS names are automatically global variables inbalid names:
            * start with a number
            * contain spaces or special characters (like -)
            */

            let a = 5;
            let b = 2;
            console.log(a + b);
            a = "5";
            console.log(a + b); // 52 
            console.log(a - b); // 3
            console.log(a * b);
            console.log(a / b);
            console.log(a % b);
            console.log(a ** b);
            console.log(Math.pow(a, b));
            console.log(Math.sqrt(a, b));
            console.log(Math.pow(b, 0.5));
            console.log(b**0.5);

            a = Number(a) + 5;
            console.log(a);
            a += 5
            a *= 2
            a /= 3
            a %= 4
            a **= 10
            console.log(a);

            const s1 = "Welcome to academy";
            const s2 = 'Welcome to "academy"';
            const s3 = 'Welcome to \"academy"\"!"';
            console.log(s1, s2, s3);

            const age = 19;
            console.log("I am " + age + " years old");
            console.log(`I am ${age} Years old`)

            let today = new Date();
            console.log(today);
            let someDate = new Date("December 28, 2006");
            console.log(someDate);

            console.log(today.getDay());
            switch (today.getDay()){
                case 1: console.log("Monday"); break;
                case 2: console.log("Tuesday"); break;
                case 3: console.log("Wednesday"); break;
                case 4: console.log("Thursday"); break;
                case 5: console.log("Friday"); break;
                default: console.log("Weekend"); break;
            }
        </script>
