<!--The game works to some extent. You can click on a piece and move it to another square,
but it does not follow real chess rules. Any piece can move to any square, even if
another piece of the same color is already there. Because of this, it is not a fully
functional chess game.-->
<!DOCTYPE html>

         <style>

            .cell {

                overflow: hidden

            .light { background-color: rgb(151, 151, 149);}
            .dark { background-color: rgb(50, 49, 49);}

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-columns: repeat(8, 1fr); /* 1 fraction*/
                grid-template-rows: repeat(8, 1fr);
                border: 15px solid black;
            }
            img{
                width: 50%;
                height: 80%;
                object-fit: contain;
            }
            .invert-color {
                filter: invert(100%);
            }
            h1 {
                margin-bottom: 15px;
            }
             /* this keeps our board in center and also change the font */
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                font-family: Arial, sans-serif;
            }

        <script>
            //its method 5th in the video
            let selectedPiece =null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            for (const cell of cells) {
                cell.onclick = function(){ //anonymous function
                    handleClick(cell);
                };
               
            
            }

            function handleClick(element) {
                for (const cell of cells) {
                cell.style.border = "";
                
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                }
                else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
        }

        </script>
