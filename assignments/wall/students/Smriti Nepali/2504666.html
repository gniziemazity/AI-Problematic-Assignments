<!DOCTYPE html>
<html>
<head>
    <title>Brick Wall </title>
    <style>
        #brick-wall {
            width: 400px;
        }

        .row {
            display: flex;
            
        }


        .cell {
            height: 30px;           
            width: 50px;            
            border: 3px solid gray; 
            border-radius: 5px;     
            box-sizing: border-box; 
        }

        
        .light {
            background-color: #EA420D;
        }

        .dark {
            background-color: #AD2C05;
        }

        
        .half-width {
            width: 25px;
        }
    </style>
</head>

<body>
    <h1>Brick Wall </h1>

    <div id="brick-wall">

        <!-- Row 1 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 2 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
        </div>

        <!-- Row 3 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 4 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
        </div>

        <!-- Row 5 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 6 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
        </div>

        <!-- Row 7 -->
        <div class="row">
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>
        </div>

        <!-- Row 8 -->
        <div class="row">
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
        </div>

    </div>
</body>
</html>
