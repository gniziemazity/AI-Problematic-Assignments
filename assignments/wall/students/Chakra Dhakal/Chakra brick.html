<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Step 3 — Styled brick wall</title>
  <style>
    #chess-board { width: 450px; margin:20px; }
    .row { display:flex; }
    .cell { 
      width:50px; 
      height:35px;              /* reduced height */
      box-sizing:border-box; 
      border:3px solid #333;    /* adjusted thickness */
      border-radius:6px;        /* added rounded corners */
    }
    .half-width { width:25px; }
    .light { background:#ff4d4d; }
    .dark { background:#990000; }
  </style>
</head>
<body>
  <h3>Step 3 — Brick wall styling</h3>
  <div id="chess-board">

    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

  </div>
</body>
</html>
