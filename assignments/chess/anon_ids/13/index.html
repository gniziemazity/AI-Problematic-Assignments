<!-- 
The chess board looks correct and the pieces can be moved by clicking on them.
However, this is not a complete chess game.
There are no proper rules. There is no turn system, no move checking, 
and no check or checkmate detection.
Any piece can capture any other piece, even the king.
-->

            .invert-color {

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            // method 5
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
