        that makes it so you can see them on same color tiles. Without editing
        the images I found drop-shadow filter that can achieve something like

        width further to 36%. Since we use filter in invert-color which would
        overwrite, I added inverted colored drop-shadows there also.

<!DOCTYPE html>

        <title>Chess 123456</title>
        <style>
            .cell { 
                border: 2px solid black; 
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .light { background-color: white; }
            .dark { background-color: gray; }

            #chess-board { 
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr); /* 1 fraction */
                grid-template-columns: repeat(8, 1fr);
             }

             img {
                width: 36%;
                filter: 
                    drop-shadow( 1px  1px 0 white)
                    drop-shadow(-1px  1px 0 white)
                    drop-shadow( 1px -1px 0 white)
                    drop-shadow(-1px -1px 0 white);
             }

             .invert-color {
                filter: 
                    invert(100%)
                    drop-shadow( 1px  1px 0 black)
                    drop-shadow(-1px  1px 0 black)
                    drop-shadow( 1px -1px 0 black)
                    drop-shadow(-1px -1px 0 black);
             }
        </style>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            // Method 5 from the video
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
