<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Assignment - Animals</title>
    <style>
        #animal-grid {
            display: grid;
            /* Requirement: 4 columns precisely */
            grid-template-columns: repeat(4, 120px); 
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        canvas {
            border: 1px solid #ddd;
            cursor: pointer;
            width: 120px; /* Standardize size for the 4x25 grid */
            height: 120px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Animal Grid (4x25)</h1>
        <div id="animal-grid"></div>
    </div>

    <audio id="dog-sound" src="https://www.soundjay.com/animals/sounds/dog-bark-1.mp3"></audio>
    <audio id="cat-sound" src="https://www.soundjay.com/animals/sounds/cat-meow-1.mp3"></audio>

    <script src="https://www.radufromfinland.com/dog.js"></script>
    <script src="cat.js"></script>
    <script src="script.js"></script>
</body>
</html>
