<!-- 
The chessboard displays correctly with all pieces in their starting positions.
The game partially works: pieces can be selected and moved by clicking,
but legal move validation and game rules are not implemented.
-->

<!DOCTYPE html>
<html>
<head>
    <title>Interactive Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        #board {
            width: 480px;
            height: 480px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            border: 4px solid #333;
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
        }

        .light {
            background-color: #f0d9b5;
        }

        .dark {
            background-color: #b58863;
        }

        .selected {
            outline: 3px solid red;
        }

        .square:hover {
            filter: brightness(110%);
        }
    </style>
</head>
<body>

<h1>Interactive Chess Game</h1>
<div id="board"></div>

<script>
    const board = document.getElementById("board");

    const pieces = {
        r: "♜", n: "♞", b: "♝", q: "♛", k: "♚", p: "♟",
        R: "♖", N: "♘", B: "♗", Q: "♕", K: "♔", P: "♙"
    };

    const startingPosition = [
        "rnbqkbnr",
        "pppppppp",
        "........",
        "........",
        "........",
        "........",
        "PPPPPPPP",
        "RNBQKBNR"
    ];

    let selectedSquare = null;

    // method 8
    for (const row of startingPosition) {
        const rowIndex = startingPosition.indexOf(row);

        for (const cell of row) {
            const colIndex = row.indexOf(cell);

            const square = document.createElement("div");
            square.classList.add("square");

            if ((rowIndex + colIndex) % 2 === 0) {
                square.classList.add("light");
            } else {
                square.classList.add("dark");
            }

            if (cell !== ".") {
                square.textContent = pieces[cell];
            }

            square.addEventListener("click", function() {

                if (selectedSquare) {
                    // Move piece
                    square.textContent = selectedSquare.textContent;
                    selectedSquare.textContent = "";
                    selectedSquare.classList.remove("selected");
                    selectedSquare = null;
                } 
                else if (square.textContent !== "") {
                    // Select piece
                    selectedSquare = square;
                    square.classList.add("selected");
                }

            });

            board.appendChild(square);
        }
    }
</script>

</body>
</html>
