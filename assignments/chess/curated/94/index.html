<!-- 
    PROBLEM / BUG ANALYSIS:
    The game has a few issues:
    1. There are no movement rules — any piece can be moved to any square, including
       jumping over other pieces, which is not legal in chess.
    2. When you click a destination that already has a piece, replaceChildren() replaces
       it silently — there is no capture confirmation or turn management, so you can
       "capture" your own pieces by accident.
    3. There is no turn system — both white and black pieces can be moved at any time,
       in any order.
    4. The border reset loop resets ALL cells, not just the previously selected one,
       which is slightly inefficient but visually works.
-->
<!DOCTYPE html>
<html>
    <head>
        <title>Chess Game</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;700&display=swap');

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: #1a1a2e;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: 'Lato', sans-serif;
                color: #e0d7c6;
            }

            h1 {
                font-family: 'Playfair Display', serif;
                font-size: 2.2rem;
                letter-spacing: 0.05em;
                margin-bottom: 20px;
                color: #e8d5a3;
                text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            }

            #turn-indicator {
                font-size: 1rem;
                margin-bottom: 14px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #c9b99a;
            }

            #board-wrapper {
                border: 6px solid #6b4f2a;
                border-radius: 4px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.7), 0 0 0 2px #3a2a10;
            }

            #chess-board {
                width: 480px;
                height: 480px;
                display: grid;
                grid-template-rows: repeat(8, 1fr);
                grid-template-columns: repeat(8, 1fr);
            }

            .cell {
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: filter 0.15s ease;
            }

            .cell:hover {
                filter: brightness(1.15);
            }

            .light { background-color: #f0d9b5; }
            .dark  { background-color: #b58863; }

            .cell.selected {
                outline: 4px solid #e84040;
                outline-offset: -4px;
                filter: brightness(1.1);
            }

            img {
                width: 78%;
                height: 78%;
                object-fit: contain;
                pointer-events: none;
                user-select: none;
            }

            .invert-color {
                filter: invert(100%);
            }

            #status-bar {
                margin-top: 14px;
                font-size: 0.85rem;
                color: #8a7a66;
                letter-spacing: 0.05em;
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>
        <div id="turn-indicator">White's Turn</div>

        <div id="board-wrapper">
            <div id="chess-board">
                <!-- Row 8 (black back rank) -->
                <div class="cell dark"  data-row="8" data-col="1"><img src="pieces/p4.png" class="invert-color" alt="black rook"/></div>
                <div class="cell light" data-row="8" data-col="2"><img src="pieces/p2.png" class="invert-color" alt="black knight"/></div>
                <div class="cell dark"  data-row="8" data-col="3"><img src="pieces/p3.png" class="invert-color" alt="black bishop"/></div>
                <div class="cell light" data-row="8" data-col="4"><img src="pieces/p6.png" class="invert-color" alt="black queen"/></div>
                <div class="cell dark"  data-row="8" data-col="5"><img src="pieces/p5.png" class="invert-color" alt="black king"/></div>
                <div class="cell light" data-row="8" data-col="6"><img src="pieces/p3.png" class="invert-color" alt="black bishop"/></div>
                <div class="cell dark"  data-row="8" data-col="7"><img src="pieces/p2.png" class="invert-color" alt="black knight"/></div>
                <div class="cell light" data-row="8" data-col="8"><img src="pieces/p4.png" class="invert-color" alt="black rook"/></div>

                <!-- Row 7 (black pawns) -->
                <div class="cell light" data-row="7" data-col="1"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell dark"  data-row="7" data-col="2"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell light" data-row="7" data-col="3"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell dark"  data-row="7" data-col="4"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell light" data-row="7" data-col="5"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell dark"  data-row="7" data-col="6"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell light" data-row="7" data-col="7"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>
                <div class="cell dark"  data-row="7" data-col="8"><img src="pieces/p1.png" class="invert-color" alt="black pawn"/></div>

                <!-- Row 6 (empty) -->
                <div class="cell dark"  data-row="6" data-col="1"></div>
                <div class="cell light" data-row="6" data-col="2"></div>
                <div class="cell dark"  data-row="6" data-col="3"></div>
                <div class="cell light" data-row="6" data-col="4"></div>
                <div class="cell dark"  data-row="6" data-col="5"></div>
                <div class="cell light" data-row="6" data-col="6"></div>
                <div class="cell dark"  data-row="6" data-col="7"></div>
                <div class="cell light" data-row="6" data-col="8"></div>

                <!-- Row 5 (empty) -->
                <div class="cell light" data-row="5" data-col="1"></div>
                <div class="cell dark"  data-row="5" data-col="2"></div>
                <div class="cell light" data-row="5" data-col="3"></div>
                <div class="cell dark"  data-row="5" data-col="4"></div>
                <div class="cell light" data-row="5" data-col="5"></div>
                <div class="cell dark"  data-row="5" data-col="6"></div>
                <div class="cell light" data-row="5" data-col="7"></div>
                <div class="cell dark"  data-row="5" data-col="8"></div>

                <!-- Row 4 (empty) -->
                <div class="cell dark"  data-row="4" data-col="1"></div>
                <div class="cell light" data-row="4" data-col="2"></div>
                <div class="cell dark"  data-row="4" data-col="3"></div>
                <div class="cell light" data-row="4" data-col="4"></div>
                <div class="cell dark"  data-row="4" data-col="5"></div>
                <div class="cell light" data-row="4" data-col="6"></div>
                <div class="cell dark"  data-row="4" data-col="7"></div>
                <div class="cell light" data-row="4" data-col="8"></div>

                <!-- Row 3 (empty) -->
                <div class="cell light" data-row="3" data-col="1"></div>
                <div class="cell dark"  data-row="3" data-col="2"></div>
                <div class="cell light" data-row="3" data-col="3"></div>
                <div class="cell dark"  data-row="3" data-col="4"></div>
                <div class="cell light" data-row="3" data-col="5"></div>
                <div class="cell dark"  data-row="3" data-col="6"></div>
                <div class="cell light" data-row="3" data-col="7"></div>
                <div class="cell dark"  data-row="3" data-col="8"></div>

                <!-- Row 2 (white pawns) -->
                <div class="cell dark"  data-row="2" data-col="1"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell light" data-row="2" data-col="2"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell dark"  data-row="2" data-col="3"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell light" data-row="2" data-col="4"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell dark"  data-row="2" data-col="5"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell light" data-row="2" data-col="6"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell dark"  data-row="2" data-col="7"><img src="pieces/p1.png" alt="white pawn"/></div>
                <div class="cell light" data-row="2" data-col="8"><img src="pieces/p1.png" alt="white pawn"/></div>

                <!-- Row 1 (white back rank) -->
                <div class="cell light" data-row="1" data-col="1"><img src="pieces/p4.png" alt="white rook"/></div>
                <div class="cell dark"  data-row="1" data-col="2"><img src="pieces/p2.png" alt="white knight"/></div>
                <div class="cell light" data-row="1" data-col="3"><img src="pieces/p3.png" alt="white bishop"/></div>
                <div class="cell dark"  data-row="1" data-col="4"><img src="pieces/p6.png" alt="white queen"/></div>
                <div class="cell light" data-row="1" data-col="5"><img src="pieces/p5.png" alt="white king"/></div>
                <div class="cell dark"  data-row="1" data-col="6"><img src="pieces/p3.png" alt="white bishop"/></div>
                <div class="cell light" data-row="1" data-col="7"><img src="pieces/p2.png" alt="white knight"/></div>
                <div class="cell dark"  data-row="1" data-col="8"><img src="pieces/p4.png" alt="white rook"/></div>
            </div>
        </div>

        <div id="status-bar">Click a piece to select, then click a square to move</div>

        <script>
            let selectedPiece = null;
            let selectedCell = null;
            let currentTurn = "white"; // track whose turn it is

            const cells = document.getElementsByClassName("cell");
            const turnIndicator = document.getElementById("turn-indicator");

            // method 8 - for...of loop
            for (const cell of cells) {
                cell.onclick = function () {
                    handleClick(cell);
                };
            }

            function isWhitePiece(imgElement) {
                return imgElement && !imgElement.classList.contains("invert-color");
            }

            function isBlackPiece(imgElement) {
                return imgElement && imgElement.classList.contains("invert-color");
            }

            function handleClick(element) {
                if (selectedPiece != null) {
                    // Destination clicked — move the piece
                    element.replaceChildren(selectedPiece);
                    selectedCell.classList.remove("selected");
                    selectedPiece = null;
                    selectedCell = null;

                    // Switch turns
                    currentTurn = currentTurn === "white" ? "black" : "white";
                    turnIndicator.textContent = currentTurn === "white" ? "White's Turn" : "Black's Turn";
                } else if (element.children.length > 0) {
                    const img = element.children[0];

                    // Only allow moving the correct color's pieces
                    if (currentTurn === "white" && !isWhitePiece(img)) return;
                    if (currentTurn === "black" && !isBlackPiece(img)) return;

                    // Deselect any previously selected cell
                    if (selectedCell) selectedCell.classList.remove("selected");

                    selectedPiece = img;
                    selectedCell = element;
                    element.classList.add("selected");
                }
            }
        </script>
    </body>
</html>
