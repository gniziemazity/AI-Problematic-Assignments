<!DOCTYPE html>
<html>
    <head>
        <title>Brick Wall Board</title>
        <style>
            #chess-board {
                width: 450px;
                display: flex;
                flex-wrap: wrap;
            }

            .cell {
                height: 35px;
                width: 50px;
                border: 3px solid gray;
                border-radius: 8px;
                box-sizing: border-box;
            }

            .half-width {
                width: 25px;
            }

            .light {
                background-color: #ff4d4d;
            }

            .dark {
                background-color: #660000;
            }
        </style>
    </head>
    <body>
        <h1>Brick Wall Pattern</h1>

        <div id="chess-board">

            <!-- Row 1 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 2 -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row 3 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 4 -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row 5 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 6 -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row 7 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 8 -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

        </div>
    </body>
</html>
