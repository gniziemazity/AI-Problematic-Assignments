<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sorting Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Sorting Visualizer</h1>

<div class="controls">

<script src="script.js"></script>
