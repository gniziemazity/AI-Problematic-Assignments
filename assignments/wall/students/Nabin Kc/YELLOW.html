
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Step 1 — left-offset</title>
  <style>
    #chess-board { width: 450px; margin:20px; }
    .row { display:flex; }
    .left-offset { margin-left:25px; }
    .cell { width:50px; height:50px; box-sizing:border-box; border:2px solid #333; }
    .light { background:#eee; }
    .dark { background:yellow; }
  </style>
</head>
<body>
  <h3>Step 1 — .left-offset on rows starting with dark</h3>
  <div id="chess-board">
    <!-- Rows 1..8, rows 1,3,5,7 start with dark and get .left-offset -->
    <div class="row left-offset"><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div></div>
    <div class="row"><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div></div>
    <div class="row left-offset"><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div></div>
    <div class="row"><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div></div>
    <div class="row left-offset"><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div></div>
    <div class="row"><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div></div>
    <div class="row left-offset"><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div></div>
    <div class="row"><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div><div class="cell light"></div><div class="cell dark"></div></div>
  </div>
</body>
</html>
