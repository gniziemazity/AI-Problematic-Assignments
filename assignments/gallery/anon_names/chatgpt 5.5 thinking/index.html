<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Animals Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Random Animals Demo</h1>
        <p>Press an animal to make it talk and play a sound.</p>
        <p id="status">Loading animals...</p>
        <section id="grid" aria-label="Animal grid"></section>
    </main>

    <audio id="dogSound" src="sounds/dog.mp3" preload="auto"></audio>
    <audio id="catSound" src="sounds/cat.mp3" preload="auto"></audio>

    <script src="dog.js"></script>
    <script src="cat.js"></script>
    <script>
        const grid = document.getElementById("grid");
        const status = document.getElementById("status");
        const dogSound = document.getElementById("dogSound");
        const catSound = document.getElementById("catSound");

        const names = ["Max", "Luna", "Rex", "Milo", "Nala", "Bella", "Oscar", "Simba", "Coco", "Leo"];
        const furrColors = ["#8b5a2b", "#222222", "#f1c27d", "#cfcfcf", "#ffffff", "#d2691e", "#6b4423"];
        const eyeColors = ["#3b2417", "#50a060", "#3d6fb6", "#d6a21f", "#111111"];

        /*
        // variant 1
        fetch("https://radufromfinland.com/animals/") // sends a GET request to the animal API
            .then(function(response) { // waits until the server sends a response
                return response.json(); // converts the JSON response into JavaScript data
            }) // passes the converted data to the next step
            .then(function(data) { // receives the converted data from the API
                console.log(data); // prints the data in the browser console
            }) // finishes the success path of the promise chain
            .catch(function(err) { // runs if the request or JSON conversion fails
                console.error(err); // prints the error in the browser console
            }); // ends the fetch promise chain
        */

        // variant 2
        async function fetchData() { // creates an async function so we can use await inside it
            try { // starts a block where errors can be caught
                const response = await fetch("https://radufromfinland.com/animals/"); // requests animal data from the API and waits for the response
                const data = await response.json(); // converts the response JSON into JavaScript data and waits until it is ready
                console.log(data); // prints the API data in the browser console
                return data; // sends the API data back to the code that called the function
            } catch(err) { // runs if the request or JSON conversion fails
                console.error(err); // prints the error in the browser console
                return []; // returns an empty array so the rest of the program can continue
            } // ends the error-handling block
        } // ends the async function

        function randomItem(list) {
            return list[Math.floor(Math.random() * list.length)];
        }

        function createAnimal(seedData, number) {
            const type = Math.random() < 0.5 ? "dog" : "cat";
            const source = Array.isArray(seedData) && seedData.length > 0 ? randomItem(seedData) : {};
            const name = source.name || randomItem(names) + " " + (number + 1);
            const age = source.age || Math.floor(Math.random() * 15) + 1;
            const furr = source.furr || source.fur || source.color || randomItem(furrColors);
            const eyes = source.eyes || source.eyeColor || randomItem(eyeColors);

            if (type === "cat") {
                return new Cat(name, age, furr, eyes);
            }
            return new Dog(name, age, furr, eyes);
        }

        function playAnimalSound(animal) {
            const sound = animal.kind === "cat" ? catSound : dogSound;
            sound.currentTime = 0;
            sound.play();
        }

        function addAnimalCell(animal) {
            const cell = document.createElement("button");
            cell.className = "animal-cell";
            cell.type = "button";
            cell.setAttribute("aria-label", `${animal.name}, ${animal.kind}`);

            const canvas = animal.render();
            const caption = document.createElement("span");
            caption.textContent = `${animal.name} (${animal.kind})`;

            cell.appendChild(canvas);
            cell.appendChild(caption);

            cell.onmousedown = function() {
                status.textContent = animal.talk();
                playAnimalSound(animal);
            };

            grid.appendChild(cell);
        }

        async function start() {
            const apiAnimals = await fetchData();
            grid.innerHTML = "";

            for (let i = 0; i < 100; i++) {
                const animal = createAnimal(apiAnimals, i);
                addAnimalCell(animal);
            }

            status.textContent = "100 random animals loaded in a 4 x 25 grid.";
        }

        start();
    </script>
</body>
</html>
