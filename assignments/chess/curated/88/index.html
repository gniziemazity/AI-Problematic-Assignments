<!--
    QUESTION 2 - Does the game work as expected?

    Not fully. Pieces can be picked up and moved/placed onto any cell,
    but there are several problems:
    - There is no way to DESELECT a piece. Once you click a piece, your
      next click always places it somewhere, even if you clicked the
      same square again.
    - There is no turn order (white/black can both move any time) and
      no rule checking, so illegal moves are allowed.
    - You can capture (overwrite) your OWN pieces, which is not legal.
    So it works as a basic "move pieces around" board, but not as a
    real chess game with rules.
-->
<!DOCTYPE html>
<html>
    <head>
        <title>Chess 123456</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
            }

            .cell  {
                border: 1px solid black;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer; /* shows the cells are clickable */
            }

            .light { background-color: #f0d9b5; }
            .dark  { background-color: #b58863; }

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr); /* 1 fraction */
                grid-template-columns: repeat(8, 1fr);
                margin: 20px auto; /* centers the board on the page */
                border: 3px solid black;
            }

            img {
                width: 70%;
            }
            .invert-color {
                filter: invert(100%);
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>

        <div id="chess-board">
            <!-- Row 8: black back rank (rook, knight, bishop, queen, king, bishop, knight, rook) -->
            <div class="cell light"><img src="pieces/p2.png" /></div>
            <div class="cell dark"><img src="pieces/p5.png" /></div>
            <div class="cell light"><img src="pieces/p3.png" /></div>
            <div class="cell dark"><img src="pieces/p4.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p3.png" /></div>
            <div class="cell light"><img src="pieces/p5.png" /></div>
            <div class="cell dark"><img src="pieces/p2.png" /></div>

            <!-- Row 7: black pawns -->
            <div class="cell dark"><img src="pieces/p6.png" /></div>
            <div class="cell light"><img src="pieces/p6.png" /></div>
            <div class="cell dark"><img src="pieces/p6.png" /></div>
            <div class="cell light"><img src="pieces/p6.png" /></div>
            <div class="cell dark"><img src="pieces/p6.png" /></div>
            <div class="cell light"><img src="pieces/p6.png" /></div>
            <div class="cell dark"><img src="pieces/p6.png" /></div>
            <div class="cell light"><img src="pieces/p6.png" /></div>

            <!-- Row 6: empty -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 5: empty -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 4: empty -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 3: empty -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 2: white pawns -->
            <div class="cell light"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p6.png" class="invert-color" /></div>

            <!-- Row 1: white back rank (rook, knight, bishop, queen, king, bishop, knight, rook) -->
            <div class="cell dark"><img src="pieces/p2.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p5.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p3.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p4.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p3.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p5.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p2.png" class="invert-color" /></div>
        </div>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);

            // method 8
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
    </body>
</html>
