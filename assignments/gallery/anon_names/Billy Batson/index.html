<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cats & Dogs</title>
    <style>
        #grid {
            display: grid;
            grid-template-columns: repeat(25, 70px);
            gap: 5px;
            width: max-content;
        }
    
        canvas {
            width: 60px;
            height: 60px;
            border: 1px solid black;
            display: block;
        }
    </style>
</head>
<body>

<h1>Animals Grid</h1>
<div id="grid"></div>

<!-- sounds -->
<audio id="dogSound" src="dog.mp3"></audio>
<audio id="catSound" src="cat.mp3"></audio>

<script src="dog.js"></script>
<script src="cat.js"></script>
<script src="script.js"></script>




</body>
</html>
