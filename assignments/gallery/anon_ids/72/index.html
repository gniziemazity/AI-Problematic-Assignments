<!DOCTYPE html>
<html>
<head>
    <title>Dogs and Cats - 4 Columns</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; padding: 20px; }
        
        /* THE GRID: 4 Columns */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            max-width: 800px;
            margin: 0 auto;
        }

        /* DRAWING THE ANIMALS */
        .animal-card { position: relative; cursor: pointer; padding: 10px; background: #333; border-radius: 10px; }
        .head { width: 60px; height: 60px; border-radius: 50%; margin: 20px auto 0; position: relative; border: 1px solid #555; }
        .eye-left, .eye-right { width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 20px; }
        .eye-left { left: 15px; } .eye-right { right: 15px; }
        .nose { width: 8px; height: 5px; background: pink; border-radius: 50%; position: absolute; top: 35px; left: 26px; }

        /* CAT EARS (Triangles) */
        .cat .ears::before, .cat .ears::after {
            content: ''; position: absolute; top: 10px;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 20px solid #555;
        }
        .cat .ears::before { left: 70px; } .cat .ears::after { right: 70px; }

        /* DOG EARS (Floppy) */
        .dog .ears::before, .dog .ears::after {
            content: ''; position: absolute; top: 25px;
            width: 15px; height: 35px; background: #444; border-radius: 10px;
        }
        .dog .ears::before { left: 60px; } .dog .ears::after { right: 60px; }

        .label { margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Animal </h1>

    <br>
    
    <div id="animalGrid" class="grid"></div>

    <audio id="barkSound" src="woof.mp3.mp3"></audio>
    <audio id="meowSound" src="meow.mp3.mp3"></audio>

    <script src="cat.js"></script>
    <script>generateGrid('animalGrid');</script>

</body>
</html>
