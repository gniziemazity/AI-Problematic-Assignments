<!DOCTYPE html>
<html>
<head>
    <title>Chess Board - Left Offset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chess-board">

    <!-- Row 1 (starts with light) -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
    </div>

    <!-- Row 2 (starts with dark) → left-offset -->
    <div class="row left-offset">
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

    <!-- Row 3 (starts with light) -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
    </div>

    <!-- Row 4 (starts with dark) → left-offset -->
    <div class="row left-offset">
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

    <!-- Row 5 -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
    </div>

    <!-- Row 6 → left-offset -->
    <div class="row left-offset">
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

    <!-- Row 7 -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
    </div>

    <!-- Row 8 → left-offset -->
    <div class="row left-offset">
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

</div>

</body>
</html>
