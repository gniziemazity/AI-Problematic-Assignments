
<!--This is a simple chess board made using an 8x8 grid.The light boxes are whitesmoke and the dark boxes are gray.The pieces are placed at the top and bottom like a real chess game.But the images are not showing on the board.

<!DOCTYPE html>
<html>
<head>
    <title>Chess 123456</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .cell { 
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center; 
        }

        .light { background-color: whitesmoke; }
        .dark  { background-color: gray; }

        #chess-board {
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
        }

        img {
            width: 50%;
        }

        .invert-color {
            filter: invert(100%);
        }
    </style>
</head>

<body>
    <h1>Chess Game</h1>

    <div id="chess-board">

        <!-- Row 0 - Black Major Pieces -->
        <div class="cell light"><img src="pieces/p3.png" /></div>

    <script>
        let selectedPiece = null;
        const cells = document.getElementsByClassName("cell");

        // Method 4 from the video – for...of loop
        for (const cell of cells) {
            cell.onclick = function () {
                handleClick(cell);
            };
        }

        function handleClick(element) {

            for (const cell of cells) {
                cell.style.border = "2px solid black";
            }

            if (selectedPiece != null) {
                element.replaceChildren(selectedPiece);
                selectedPiece = null;
            } 
            else if (element.children.length > 0) {
                selectedPiece = element.children[0];
                element.style.border = "4px solid red";
            }
        }
    </script>
