<!DOCTYPE html>
<html>
    <head>
        <title>Chess Board – Step 5 Final</title>
        <style>
            /* styling by ID */
            #chess-board {
                width: 425px;   /* widened to fit half-width cells on both ends */
                display: flex;
                flex-wrap: wrap;
            }
            /* CSS class */
            .cell {
                height: 30px;           /* Step 5: reduced height */
                width: 50px;
                border: 3px solid gray; /* Step 5: thicker border */
                border-radius: 6px;     /* Step 5: rounded corners for brick look */
                box-sizing: border-box;
            }
            .light {
                background-color: #cd5c5c; /* Step 3: red from ~10:00 = Indian Red */
            }
            .dark {
                background-color: #8b0000; /* Step 3: dark red from ~10:20 = Dark Red */
            }
            /* Step 4: half-width cell class */
            .half-width {
                width: 25px;
            }
       </style>
    </head>
    <body>
        <h1>Chess Board – Final</h1>
        <div id="chess-board">
            <!-- Row 1: starts light, ends light – no half-width cells needed -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 2: starts dark, ends dark – half-width light cell at start AND end -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark half-width"></div>
            <!-- Note: per task spec the padding cells are "light half-width";
                 the last cell here is dark to complete the visual row,
                 but we add a light half-width at the end as required -->
            <div class="cell light half-width"></div>

            <!-- Row 3: starts light -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 4: starts dark -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row 5: starts light -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 6: starts dark -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>

            <!-- Row 7: starts light -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 8: starts dark -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell light half-width"></div>
        </div>

        <a href="https://www.w3schools.com" target="_blank">Visit W3Schools.com!</a>
    </body>
</html>
