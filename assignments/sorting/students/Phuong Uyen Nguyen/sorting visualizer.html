<!DOCTYPE html>
<html>
    <head>
        <title>Sorting Visualizer</title>
        <style>
            body {
                display: flex;
                align-items: center;
                flex-direction: column;
            }
            #vis-123456 {
            height: 200px;
            display: flex;
            align-items: flex-end;
            position: relative;   /* IMPORTANT */
}
            .bar {
                width: 7px;
                height: 100%;
                background-color: black;
                margin: 0px 1px;
            }
            #motorcycle {
    position: absolute;
    font-size: 24px;
    left: 0;
    bottom: 0;
    pointer-events: none;
    transform: scaleX(-1);
            }

.wheel {
    width: 10px;
    height: 10px;
    background-color: black;   /* BLACK WHEELS */
    border-radius: 50%;
    position: absolute;
    bottom: 0;
}

.wheel.left {
    left: 0;
}

.wheel.right {
    right: 0;
}

.body {
    width: 20px;
    height: 6px;
    background-color: red;
    position: absolute;
    bottom: 8px;
    left: 10px;
    border-radius: 3px;
}
            
        </style>
    </head>
    <body>
        <h1>Sorting Visualizer</h1>
        <div id="vis-123456">
            <div id="motorcycle">🏍</div>
        </div>
        <label for="speedRange">Speed: <span id="speedValue">100</span> ms</label>
        <input type="range" id="speedRange" min="10" max="500" value="100"onchange="changeSpeed(this.value)">
        <script>
            // global variables
            const count = 50;
            const array = new Array(count);

            // animation speed (milliseconds)
            let var_speed = 100;   // smaller = faster, bigger = slower

            for (let i = 0; i < count; i++) {
                array[i] = Math.random(); // numbers between 0 and 1
            }

            const visualizer = document.getElementById("vis-123456");
            for (let i = 0; i < array.length; i++) {
                const bar = document.createElement("div");
                visualizer.appendChild(bar);
                bar.classList.add("bar");
                bar.style.height = array[i] * 100 + "%"; /* + here is 
                    string concatenation because 
                    the second item "%" is a string */
            }
            
            bubbleSort(array);

            function updateBars() {
                const bars = document.getElementsByClassName("bar");
                for (let i = 0; i < bars.length; i++) {
                    bars[i].style.height = array[i] * 100 + "%";
                }
            }

            async function bubbleSort(arr) {
                do {
                    var swapped = false;
                    for (let i = 1; i < arr.length; i++) {
                        if (arr[i - 1] > arr[i]) {
                            const aux = arr[i - 1];
                            arr[i - 1] = arr[i];
                            arr[i] = aux;
                            swapped = true;
                            updateBars();
                            await new Promise(resolve => setTimeout(resolve, 100));
                        }
                    }
                } while (swapped);
            }
            async function bubbleSort(arr) {
    do {
        var swapped = false;
        for (let i = 1; i < arr.length; i++) {
            if (arr[i - 1] > arr[i]) {
                const aux = arr[i - 1];
                arr[i - 1] = arr[i];
                arr[i] = aux;
                swapped = true;
                updateBars();
                await new Promise(resolve => setTimeout(resolve, var_speed));
            }
        }
    } while (swapped);

    animateMotorcycle();  // start animation after sorting
}
var_speed = 20;   // very fast
function changeSpeed(value) {
    var_speed = parseInt(value);
    document.getElementById("speedValue").textContent = var_speed;
}
async function animateMotorcycle() {
    const moto = document.getElementById("motorcycle");
    const bars = document.getElementsByClassName("bar");

    for (let i = 0; i < bars.length; i++) {

        const barHeight = bars[i].offsetHeight;

        moto.style.left = bars[i].offsetLeft + "px";
        moto.style.bottom = barHeight + "px";

        await new Promise(resolve => setTimeout(resolve, 50));
    }
}

        </script>
    </body>
</html>
