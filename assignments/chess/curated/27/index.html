<!-- 
The chess board loads correctly and pieces appear in the correct starting positions.
However, this is not a complete chess game because the pieces do not follow official chess movement rules.
-->

<!DOCTYPE html>
<html>
<head>
    <title>Chess Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        #chess-board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
        }

        .cell {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
        }

        .light {
            background-color: #f0d9b5;
        }

        .dark {
            background-color: #b58863;
        }
    </style>
</head>
<body>

<div id="chess-board"></div>

<script>
    const board = document.getElementById("chess-board");

    const pieces = [
        "♜","♞","♝","♛","♚","♝","♞","♜",
        "♟","♟","♟","♟","♟","♟","♟","♟",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "♙","♙","♙","♙","♙","♙","♙","♙",
        "♖","♘","♗","♕","♔","♗","♘","♖"
    ];

    let index = 0;

    // method 8
    for (const piece of pieces) {
        const cell = document.createElement("div");
        cell.classList.add("cell");

        const row = Math.floor(index / 8);
        const col = index % 8;

        if ((row + col) % 2 === 0) {
            cell.classList.add("light");
        } else {
            cell.classList.add("dark");
        }

        cell.textContent = piece;

        board.appendChild(cell);
        index++;
    }
</script>

</body>
</html>
