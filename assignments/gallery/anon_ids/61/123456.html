    <script src="cat.js"></script>

    <script>
    const container = document.getElementById("container"); // Gets the container from HTML

    /*
    fetch("https://radufromfinland.com/animals/") // Requests animal data from API
      .then(function(response) { // Runs when response arrives
        return response.json(); // Converts response to JSON
      })
      .then(function(data) { // Runs when JSON is ready
        console.log(data); // Prints data in console
      })
      .catch(function(err) { // Runs if an error happens
        console.error(err); // Prints the error
      });
    */

    const dogSound = new Audio("dog-bark.mp3"); // Loads dog sound once
    const catSound = new Audio("cat-meow.mp3"); // Loads cat sound once

    async function fetchData() { // Creates async function to fetch data
      try { // Starts try block
        const response = await fetch("https://radufromfinland.com/animals/"); // Fetches JSON data from server
        const data = await response.json(); // Converts response into JavaScript array
        console.log(data); // Prints all animal data in console

        for (let i = 0; i < 100; i++) { // Repeats 100 times
          const randomAnimal = data[Math.floor(Math.random() * data.length)]; // Picks one random animal from the array
          let animal; // Creates variable for Dog or Cat object

          if (randomAnimal.type === "DOG") { // Checks if selected animal is a dog
            animal = new Dog(randomAnimal.name, randomAnimal.age, randomAnimal.furr, randomAnimal.eyes); // Creates Dog object
          } else if (randomAnimal.type === "CAT") { // Checks if selected animal is a cat
            animal = new Cat(randomAnimal.name, randomAnimal.age, randomAnimal.furr, randomAnimal.eyes); // Creates Cat object
          }

        const canvas = animal.render(120); // Draws the animal on a small canvas
        canvas.onclick = function () { // Runs when canvas is clicked
        animal.talk(); // Calls talk method

        if (animal instanceof Dog) { // Checks if animal is Dog
            dogSound.play(); // Plays dog sound
        } else if (animal instanceof Cat) { // Checks if animal is Cat
            catSound.play(); // Plays cat sound
        }
        };
          gridContainer.appendChild(canvas); // Adds canvas to the grid
        }

      } catch (err) { // Runs if an error happens
        console.error(err); // Prints error in console
      }
    }

    fetchData(); // Calls the function
  </script>
