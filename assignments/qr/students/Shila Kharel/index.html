<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Positioning</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>QR Positioning</h1>

    <div id="mapContainer">
        <img src="map.png" id="map" alt="map" />
        <div id="marker"></div>
    </div>

    <button id="btn" onclick="toggleScanner()">SCAN</button>

    <div id="camera"></div>

    <p id="item-name"></p>
    <p id="item-stock"></p>
    <p id="item-price"></p>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="script.js"></script>
</body>
</html>
