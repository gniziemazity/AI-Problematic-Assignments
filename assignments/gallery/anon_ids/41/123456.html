<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson</title>

    <style>
        #animalGrid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
            margin-top: 20px;
        }

        #animalGrid canvas {
            width: 100px;
            height: 100px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        My first Emmet abbreviations:
        <ol>
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol>li*3 (ordered list with 3 items)</li>
        </ol>
        (all followed by Tab / Enter)
    </div>

    <h2>100 Random Animals</h2>
    <div id="animalGrid"></div>

    <!-- Save these files in the same folder as index.html -->
    <audio id="catSound" preload="auto">
        <source src="cat-meow.mp3" type="audio/mpeg">
    </audio>

    <audio id="dogSound" preload="auto">
        <source src="dog-bark.mp3" type="audio/mpeg">
    </audio>

    <script src="https://www.radufromfinland.com/dog.js"></script>
    <script src="cat.js"></script>

    <script>
        myNumber = 25.2; // never define without const, let (or var)
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean; // var was "replaced" by let and const
        console.log(myBoolean, oppositeBoolean); // accepts multiple parameters
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        console.log(!42, !"ABC", ![]);
        console.log(!null, !undefined, !0); // zero is "falsy"

        // arrays are like Python lists
        const myArray = [1, 2, 3, "Academy", true, null];
        myArray.length = 0;
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        // myArray = [1, 2, 3]; ERROR! Program would fail here!
        try {
            myArray = [1, 2, 3];
        } catch(err) {
            console.error(err);
        }
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b){ return a - b; });
        console.log(myArray);

        // objects are like Python dictionaries
        const dog = {
            name: "Max",
            age: 5,
            furr: "black",
            eyes: "brown"
        };
        console.log(dog);
        console.table(dog);
        console.log(dog.name);
        dog.name = "Charlie";
        console.log(dog["name"]);

        const anotherDog = new Dog("Rex", 7, "brown", "black");
        console.log(anotherDog);
        anotherDog.talk();
        const canvas = anotherDog.render();
        container.appendChild(canvas); /*
            no need for document.getElementById("container")
            ids that are valid JS names are automatically global variables
            invalid names:
             * start with a number
             * contain spaces or special characters (like -)
        */

        canvas.onmousedown = function() {
            anotherDog.talk();
            const dogSound = document.getElementById("dogSound");
            dogSound.currentTime = 0;
            dogSound.play().catch(function(err) {
                console.error(err);
            });
        };

        let a = 5;
        let b = 2;
        // operators
        console.log(a + b);
        a = "5";
        console.log(a + b); // concatenation
        console.log(a - b);
        console.log(a * b);
        console.log(a / b);
        console.log(a % b);
        console.log(a ** b);
        console.log(Math.pow(a, b));
        console.log(Math.sqrt(b));
        console.log(Math.pow(b, 0.5));
        console.log(b ** 0.5);

        a = Number(a) + 5;
        console.log(a);
        a += 5;
        a *= 2;
        a /= 3;
        a %= 4;
        a **= 10;
        console.log(a);

        const s1 = "Welcome to Academy!";
        const s2 = 'Welcome to "Academy"!';
        const s3 = "Welcome to \"Academy\"!"; // escaping with \
        console.log(s1, s2, s3);

        const age = 36;
        console.log("I am " + age + " years old");
        console.log(`I am ${age} years old`); // template literal

        let today = new Date();
        console.log(today);
        let someDate = new Date("August 24, 2025");
        console.log(someDate);

        console.log(today.getDay());
        switch (today.getDay()) {
            case 1: console.log("Monday"); break;
            case 2: console.log("Tuesday"); break;
            case 3: console.log("Wednesday"); break;
            case 4: console.log("Thursday"); break;
            case 5: console.log("Friday"); break;
            default: console.log("Weekend"); break;
        }
    </script>

    <script>
        const animalGrid = document.getElementById("animalGrid"); // get the grid container
        const catSound = document.getElementById("catSound"); // get cat sound
        const dogSound = document.getElementById("dogSound"); // get dog sound

        function playAnimalSound(type) { // play the correct sound
            const sound = type === "cat" ? catSound : dogSound; // choose cat or dog sound
            sound.currentTime = 0; // restart from the beginning
            sound.play().catch(function(err) { // play the sound
                console.error(err); // print audio errors
            }); // end play
        } // end function

        /*
        fetch("https://radufromfinland.com/animals/") // send a request to the API
            .then(function(response) { // wait for the server response
                return response.json(); // convert the response into JSON
            }) // end first then block
            .then(function(data) { // run after JSON data is ready
                console.log(data); // print the data to the console
            }) // end second then block
            .catch(function(err) { // run if an error happens
                console.error(err); // print the error to the console
            }); // end the fetch chain
        */

        async function fetchData() { // create an async function for fetching data
            try { // start the error handling block
                const response = await fetch("https://radufromfinland.com/animals/"); // request animal data from the API
                const data = await response.json(); // convert the response into JSON data
                console.log(data); // print the data to the console

                for (let i = 0; i < 100; i++) { // repeat 100 times
                    const randomAnimal = data[Math.floor(Math.random() * data.length)]; // choose one random animal
                    let animal; // variable for the animal object
                    let type; // variable for animal type

                    if (Math.random() < 0.5) { // choose dog about half the time
                        animal = new Dog(randomAnimal.name, randomAnimal.age, randomAnimal.furr, randomAnimal.eyes); // create dog
                        type = "dog"; // set type to dog
                    } else { // otherwise create cat
                        animal = new Cat(randomAnimal.name, randomAnimal.age, randomAnimal.furr, randomAnimal.eyes); // create cat
                        type = "cat"; // set type to cat
                    } // end if else

                    const animalCanvas = animal.render(); // draw the animal and get its canvas

                    animalCanvas.onmousedown = function() { // run when the canvas is pressed
                        animal.talk(); // make the animal talk
                        playAnimalSound(type); // play matching sound
                    }; // end onmousedown

                    animalGrid.appendChild(animalCanvas); // add the animal to the grid
                } // end loop
            } catch(err) { // catch possible errors
                console.error(err); // print errors to the console
            } // end try catch
        } // end function

        fetchData(); // call the function
    </script>
</body>
</html>
