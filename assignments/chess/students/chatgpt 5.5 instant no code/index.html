<!-- The game works mostly as expected: players can move pieces by clicking a piece and then clicking a target square, but it does not fully enforce all official chess rules such as check, checkmate, castling, en passant, or pawn promotion. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 24px;
    }

    #status {
      margin-bottom: 16px;
      font-size: 18px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 70px);
      grid-template-rows: repeat(8, 70px);
      border: 5px solid #111;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
    }

    .square {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      cursor: pointer;
      user-select: none;
    }

    .light {
      background: #f0d9b5;
    }

    .dark {
      background: #b58863;
    }

    .selected {
      outline: 4px solid yellow;
      outline-offset: -4px;
    }

    .possible {
      box-shadow: inset 0 0 0 5px rgba(80, 180, 80, 0.8);
    }

    button {
      margin-top: 18px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Chess Game</h1>
  <div id="status">White's turn</div>
  <div id="board"></div>
  <button onclick="resetGame()">Reset Game</button>

  <script>
    const boardElement = document.getElementById("board");
    const statusElement = document.getElementById("status");

    const pieces = {
      black: {
        king: "♚",
        queen: "♛",
        rook: "♜",
        bishop: "♝",
        knight: "♞",
        pawn: "♟"
      },
      white: {
        king: "♔",
        queen: "♕",
        rook: "♖",
        bishop: "♗",
        knight: "♘",
        pawn: "♙"
      }
    };

    let board;
    let selectedSquare = null;
    let currentPlayer = "white";

    function resetGame() {
      board = [
        [
          { type: "rook", color: "black" },
          { type: "knight", color: "black" },
          { type: "bishop", color: "black" },
          { type: "queen", color: "black" },
          { type: "king", color: "black" },
          { type: "bishop", color: "black" },
          { type: "knight", color: "black" },
          { type: "rook", color: "black" }
        ],
        Array(8).fill(null).map(() => ({ type: "pawn", color: "black" })),
        Array(8).fill(null),
        Array(8).fill(null),
        Array(8).fill(null),
        Array(8).fill(null),
        Array(8).fill(null).map(() => ({ type: "pawn", color: "white" })),
        [
          { type: "rook", color: "white" },
          { type: "knight", color: "white" },
          { type: "bishop", color: "white" },
          { type: "queen", color: "white" },
          { type: "king", color: "white" },
          { type: "bishop", color: "white" },
          { type: "knight", color: "white" },
          { type: "rook", color: "white" }
        ]
      ];

      selectedSquare = null;
      currentPlayer = "white";
      statusElement.textContent = "White's turn";
      drawBoard();
    }

    function drawBoard() {
      boardElement.innerHTML = "";

      // method 8
      for (const [rowIndex, row] of board.entries()) {
        for (const [colIndex, piece] of row.entries()) {
          const square = document.createElement("div");
          square.classList.add("square");
          square.classList.add((rowIndex + colIndex) % 2 === 0 ? "light" : "dark");
          square.dataset.row = rowIndex;
          square.dataset.col = colIndex;

          if (piece) {
            square.textContent = pieces[piece.color][piece.type];
          }

          square.addEventListener("click", () => handleSquareClick(rowIndex, colIndex));
          boardElement.appendChild(square);
        }
      }
    }

    function handleSquareClick(row, col) {
      const piece = board[row][col];

      if (selectedSquare === null) {
        if (piece && piece.color === currentPlayer) {
          selectedSquare = { row, col };
          highlightSelectedSquare();
        }
        return;
      }

      const fromRow = selectedSquare.row;
      const fromCol = selectedSquare.col;
      const movingPiece = board[fromRow][fromCol];

      if (piece && piece.color === currentPlayer) {
        selectedSquare = { row, col };
        highlightSelectedSquare();
        return;
      }

      if (isValidMove(movingPiece, fromRow, fromCol, row, col)) {
        board[row][col] = movingPiece;
        board[fromRow][fromCol] = null;
        currentPlayer = currentPlayer === "white" ? "black" : "white";
        statusElement.textContent = currentPlayer === "white" ? "White's turn" : "Black's turn";
      }

      selectedSquare = null;
      drawBoard();
    }

    function highlightSelectedSquare() {
      drawBoard();
      const square = document.querySelector(
        `[data-row="${selectedSquare.row}"][data-col="${selectedSquare.col}"]`
      );
      square.classList.add("selected");
    }

    function isValidMove(piece, fromRow, fromCol, toRow, toCol) {
      if (!piece) return false;

      const target = board[toRow][toCol];
      if (target && target.color === piece.color) return false;

      const rowDiff = toRow - fromRow;
      const colDiff = toCol - fromCol;
      const absRow = Math.abs(rowDiff);
      const absCol = Math.abs(colDiff);

      if (piece.type === "pawn") {
        const direction = piece.color === "white" ? -1 : 1;
        const startRow = piece.color === "white" ? 6 : 1;

        if (colDiff === 0 && rowDiff === direction && !target) return true;
        if (colDiff === 0 && fromRow === startRow && rowDiff === 2 * direction && !target && !board[fromRow + direction][fromCol]) return true;
        if (absCol === 1 && rowDiff === direction && target && target.color !== piece.color) return true;
        return false;
      }

      if (piece.type === "rook") {
        return (fromRow === toRow || fromCol === toCol) && isPathClear(fromRow, fromCol, toRow, toCol);
      }

      if (piece.type === "bishop") {
        return absRow === absCol && isPathClear(fromRow, fromCol, toRow, toCol);
      }

      if (piece.type === "queen") {
        return (fromRow === toRow || fromCol === toCol || absRow === absCol) && isPathClear(fromRow, fromCol, toRow, toCol);
      }

      if (piece.type === "knight") {
        return (absRow === 2 && absCol === 1) || (absRow === 1 && absCol === 2);
      }

      if (piece.type === "king") {
        return absRow <= 1 && absCol <= 1;
      }

      return false;
    }

    function isPathClear(fromRow, fromCol, toRow, toCol) {
      const rowStep = Math.sign(toRow - fromRow);
      const colStep = Math.sign(toCol - fromCol);

      let currentRow = fromRow + rowStep;
      let currentCol = fromCol + colStep;

      while (currentRow !== toRow || currentCol !== toCol) {
        if (board[currentRow][currentCol]) return false;
        currentRow += rowStep;
        currentCol += colStep;
      }

      return true;
    }

    resetGame();
  </script>
</body>
</html>
