<!DOCTYPE html>

    <head>
        <title>Brick Wall Board</title>
        <style>
            /* styling by ID */
            #chess-board {
                width: 425px; /* Increased width to accommodate the half-width cells (400px + 25px) */
                display: flex;
                flex-wrap: wrap;
            }
            /* CSS class */
            .cell {
                height: 30px; /* Reduced height to look like bricks */
                width: 50px;
                border: 2px solid gray; /* Adjusted thickness for mortar look */
                border-radius: 4px; /* Rounded corners for individual bricks */
                box-sizing: border-box; /* size includes padding and border */
            }
            /* Red color from timestamp 10:00 */
            .light {
                background-color: #FF0000; 
            }
            /* Dark red color from timestamp 10:20 */
            .dark {
                background-color: #8B0000; 
            }
            /* Half-width class for shifting the rows */
            .half-width {
                width: 25px;
            }
       </style>
    </head>
