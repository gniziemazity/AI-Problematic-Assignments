<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Lesson</title>
  <style>
    #animalGrid {
      display: grid;                              /* Grid layout */
      grid-template-columns: repeat(4, 1fr);      /* 4 equal columns */
      gap: 5px;                                   /* Gap between cells */
      padding: 10px;                              /* Outer padding */
      max-width: 800px;                           /* Max width */
      margin: 0 auto;                             /* Center grid */
    }
    canvas {
      cursor: pointer;                            /* Pointer cursor */
      border: 1px solid #ccc;                     /* Light border */
      border-radius: 8px;                         /* Rounded corners */
      width: 100%;                                /* Fill column */
      height: auto;                               /* Keep ratio */
      display: block;                             /* No inline gap */
    }
    canvas:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);     /* Hover effect */
    }
  </style>
</head>
<body>
  <div id="container">
    My first Emmet abbreviations:
    <ol>
      <li>! (HTML boilerplate)</li>
      <li>div#container (div with id)</li>
      <li>ol>li*3 (ordered list with 3 items)</li>
    </ol>
    (all followed by Tab / Enter)
  </div>

  <h2 style="text-align:center;">Dog & Cat Grid (Click to hear sounds!)</h2>
  <div id="animalGrid"></div>  <!-- Animal grid container -->

  <script src="https://www.radufromfinland.com/dog.js"></script>  <!-- Radu's Dog class -->
  <script src="cat.js"></script>  <!-- Local Cat class -->
  <script src="dog.js"></script>

  <script>
    myNumber = 25.2; // never define without const, let (or var)
    console.log(myNumber);

    const myString = "I study at Academy";
    console.log(myString);

    let myBoolean = true;
    var oppositeBoolean = !myBoolean; // var was "replaced" by let and const
    console.log(myBoolean, oppositeBoolean); // accepts multiple parameters
    myBoolean = false;
    oppositeBoolean = !myBoolean;
    console.log(myBoolean, oppositeBoolean);

    console.log(!42, !"ABC", ![]);
    console.log(!null, !undefined, !0); // zero is "falsy"

    const myArray = [1, 2, 3, "Academy", true, null];
    myArray.length = 0;
    myArray[0] = 9;
    myArray[1] = 8;
    myArray[2] = 7;
    try {
      myArray = [1, 2, 3];
    } catch(err) {
      console.error(err);
    }
    myArray.push(6);
    myArray.push(11);
    myArray.sort(function(a, b){ return a - b; });
    console.log(myArray);

    const dog = {
      name: "Max",
      age: 5,
      furr: "black",
      eyes: "brown"
    };
    console.log(dog);
    console.table(dog);
    console.log(dog.name);
    dog.name = "Charlie";
    console.log(dog["name"]);

    const anotherDog = new Dog("Rex", 7, "brown", "black");
    console.log(anotherDog);
    anotherDog.talk();
    const canvas = anotherDog.render();
    container.appendChild(canvas);

    let a = 5;
    let b = 2;
    console.log(a + b);
    a = "5";
    console.log(a + b);
    console.log(a - b);
    console.log(a * b);
    console.log(a / b);
    console.log(a % b);
    console.log(a ** b);
    console.log(Math.pow(a, b));
    console.log(Math.sqrt(b));
    console.log(Math.pow(b, 0.5));
    console.log(b ** 0.5);

    a = Number(a) + 5;
    console.log(a);
    a += 5;
    a *= 2;
    a /= 3;
    a %= 4;
    a **= 10;
    console.log(a);

    const s1 = "Welcome to Academy!";
    const s2 = 'Welcome to "Academy"!';
    const s3 = "Welcome to \"Academy\"!";
    console.log(s1, s2, s3);

    const age = 36;
    console.log("I am " + age + " years old");
    console.log(`I am ${age} years old`);

    let today = new Date();
    console.log(today);
    let someDate = new Date("August 24, 2025");
    console.log(someDate);

    console.log(today.getDay());
    switch (today.getDay()) {
      case 1: console.log("Monday"); break;
      case 2: console.log("Tuesday"); break;
      case 3: console.log("Wednesday"); break;
      case 4: console.log("Thursday"); break;
      case 5: console.log("Friday"); break;
      default: console.log("Weekend"); break;
    }

    // Add draw() to Radu's Dog class using prototype
    Dog.prototype.draw = function(ctx, x, y, size) {  // Add draw method to Dog
      // Head
      ctx.beginPath();                               // Start new path
      ctx.arc(x, y, size, 0, Math.PI * 2);          // Draw head circle
      ctx.fillStyle = this.furr;                     // Radu's property is 'furr'
      ctx.fill();                                    // Fill head
      ctx.strokeStyle = "#333";                      // Border color
      ctx.stroke();                                  // Draw border

      // Left ear (floppy)
      ctx.beginPath();                               // Start new path
      ctx.ellipse(x - size * 0.8, y, size * 0.25, size * 0.45, -0.3, 0, Math.PI * 2);  // Left ear
      ctx.fillStyle = this.furr;                     // Ear color
      ctx.fill();                                    // Fill ear
      ctx.stroke();                                  // Ear border

      // Right ear (floppy)
      ctx.beginPath();                               // Start new path
      ctx.ellipse(x + size * 0.8, y, size * 0.25, size * 0.45, 0.3, 0, Math.PI * 2);   // Right ear
      ctx.fillStyle = this.furr;                     // Ear color
      ctx.fill();                                    // Fill ear
      ctx.stroke();                                  // Ear border

      // Left eye
      ctx.beginPath();                               // Start new path
      ctx.arc(x - size * 0.3, y - size * 0.15, size * 0.12, 0, Math.PI * 2);  // Left eye
      ctx.fillStyle = this.eyes;                     // Radu's property is 'eyes'
      ctx.fill();                                    // Fill left eye

      // Right eye
      ctx.beginPath();                               // Start new path
      ctx.arc(x + size * 0.3, y - size * 0.15, size * 0.12, 0, Math.PI * 2);  // Right eye
      ctx.fillStyle = this.eyes;                     // Eye color
      ctx.fill();                                    // Fill right eye

      // Nose
      ctx.beginPath();                               // Start new path
      ctx.arc(x, y + size * 0.2, size * 0.1, 0, Math.PI * 2);  // Nose circle
      ctx.fillStyle = "black";                       // Black nose
      ctx.fill();                                    // Fill nose

      // Mouth
      ctx.beginPath();                               // Start new path
      ctx.arc(x, y + size * 0.35, size * 0.15, 0, Math.PI);  // Smile curve
      ctx.strokeStyle = "#333";                      // Mouth color
      ctx.lineWidth = 2;                             // Line thickness
      ctx.stroke();                                  // Draw mouth
    };

    // Override talk() to add sound to Radu's Dog
    Dog.prototype.talk = function() {                // Override talk method
      console.log(`Woof! I'm ${this.name} 🐶`);     // Print woof to console
      let audio = new Audio('Dog.mp3');              // Load dog audio file
      // Sound source: Dog.mp3 (freesound.org)
      audio.play().catch(function(err) { console.error(err); });  // Play with error catch
    };

    /* ===========================================
       VARIANT 1: .then() chain - COMMENTED OUT
       ===========================================
    fetch('https://radufromfinland.com/animals/')    // Start fetch request
      .then(function(response) {                     // Handle response
        return response.json();                      // Convert to JSON
      })
      .then(function(data) {                         // Handle JSON data
        console.log(data);                           // Log data
      })
      .catch(function(err) {                         // Handle errors
        console.error(err);                          // Log error
      });
    */

    // VARIANT 2: async/await - PREFERRED & USED
    async function fetchData() {                     // Define async function
      try {                                          // Begin try block
        const response = await fetch('https://radufromfinland.com/animals/');  // Await API response
        const data = await response.json();          // Await JSON parse
        console.log(data);                           // Log parsed data

        const grid = document.getElementById('animalGrid');  // Get grid container
        grid.innerHTML = '';                         // Clear existing content

        for (let i = 0; i < 100; i++) {             // Loop 100 times
          const animalData = data[Math.floor(Math.random() * data.length)];  // Pick random animal

          let animal;                                // Declare animal variable
          if (animalData.type.toLowerCase() === 'cat') {  // Check if cat
            animal = new Cat(                        // Create Cat instance
              animalData.name,                       // API name
              animalData.age,                        // API age
              animalData.furr,                              // Fur color
              animalData.eyes                                // Eye color
            );
          } else {                                   // Otherwise dog
            animal = new Dog(                        // Create Dog instance
              animalData.name,                       // API name
              animalData.age,                        // API age
              animalData.furr,                             // Fur color (brownish)
              animalData.eyes                                // Eye color
            );
          }

          const cv = document.createElement('canvas');  // Create canvas element
          cv.width = 120;                            // Canvas width
          cv.height = 120;                           // Canvas height
          const ctx = cv.getContext('2d');           // Get 2D context
          animal.draw(ctx, 60, 60, 35);              // Draw animal at center

          cv.onmousedown = function(e) {             // Mouse down event
            e.preventDefault();                      // Prevent default
            animal.talk();                           // Trigger talk + sound
          };

          grid.appendChild(cv);                      // Add to grid
        }

      } catch(err) {                                 // Catch errors
        console.error('Fetch error:', err);          // Log error
      }
    }

    fetchData();  // Start the app

  </script>
</body>
</html>
