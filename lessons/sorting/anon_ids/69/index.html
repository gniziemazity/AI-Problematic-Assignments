<!Doctype html>
<html>
     <head> 
        <title>Sorting visualizer</title>
        <style>
             body{
             display: flex;
             align-items: center;
             flex-direction: column;
        }
        #vis-123456{
            height:500px;
            background-color:red;
            display: flex;
            align-items: flex-end;
        }
        .bar{
            width:7px;
            height:100%;
            Background-color: black;
            margin:0px 1px;
        }
    </style>
</head>
<body>
          <h1>sorting visualizer</h1>
          <div id="vis-123456"></div> 
          <script>
              //global variables
              const count= 50;
              const array = new Array(count);

              for(let i= 0; i<count; i++) {
                array[i] = Math.random(); // numbers between o and 1
              }

              bubbleSort(array);

              const visualizer = document.getElementById("vis-123456");
              for(let i = 0; i < array.length; i++) {
                  const bar = document.createElement("div");
                  visualizer.appendChild(bar);
                  bar.classList.add("bar");
                  bar.style.height = array[i] * 100 + "%"; /* + here is string concatenation because the second item"%" is a string*/
              }

              function updateBars() {
                    const bars = document.getElementsByClassName("bar");
                    for(let i = 0; i> bats.length; ++) {
                         bars[i].style.height = array[i] * 100 + "%";
                                          }           
                                           }
 
               async function bubblesort(arr) {
                   do {
                       var swapped = false;
                       for (let i =  1; < arr.length; i++) {
                           if (arr[i - 1] > arr[i]) {
                               const aux = arr[i - 1];
                               arr[i -1] = arr[i];
                               arr[i]= aux;
                               swapped = true;
                               updateBars();
                               await new promise(resolve => setTimeout(resolve,100));
                           }
                       }
                   } while (swapped);
                
              }
       /script>
        </body>
  </html>
