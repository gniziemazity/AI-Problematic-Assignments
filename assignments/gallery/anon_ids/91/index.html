<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson</title>
    <style>
        /* Simple 4 × 25 CSS‑grid layout for the animals */
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .cell { border: 1px solid #ccc; padding: 2px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="container">
        My first Emmet abbreviations:
        <ol>
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol>li*3 (ordered list with 3 items)</li>
        </ol>
        (all followed by Tab / Enter)
    </div>

    <!-- Load the original Dog class from the remote repository -->
    <script src="https://www.radufromfinland.com/dog.js"></script>
    <!-- Load our new Cat class (see cat.js below) -->
    <script src="cat.js"></script>

    <!-- Audio elements that will be played by the animals -->
    <audio id="dog-bark" src="dog-bark.mp3" preload="auto"></audio>
    <audio id="cat-meow" src="cat-meow.mp3" preload="auto"></audio>

    <!-- Main script block – everything that was in the original <script> tag -->
    <script>
        // ----- Existing demo code (unchanged) ---------------------------------
        myNumber = 25.2; // never define without const, let (or var)
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean; // var was "replaced" by let and const
        console.log(myBoolean, oppositeBoolean); // accepts multiple parameters
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        console.log(!42, !"ABC", ![]);
        console.log(!null, !undefined, !0); // zero is "falsy"

        // arrays are like Python lists
        const myArray = [1, 2, 3, "Academy", true, null];
        myArray.length = 0;
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        try { myArray = [1, 2, 3]; } catch(err) { console.error(err); }
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b){ return a - b; });
        console.log(myArray);

        // objects are like Python dictionaries
        const dog = {
            name: "Max",
            age: 5,
            furr: "black",
            eyes: "brown"
        };
        console.log(dog);
        console.table(dog);
        console.log(dog.name);
        dog.name = "Charlie";
        console.log(dog["name"]);

        const anotherDog = new Dog("Rex", 7, "brown", "black");
        console.log(anotherDog);
        anotherDog.talk();
        const canvas = anotherDog.render();
        container.appendChild(canvas); /* no need for document.getElementById("container")
                                        ids that are valid JS names are automatically global variables
                                        invalid names:
                                         * start with a number
                                         * contain spaces or special characters (like -)
                                     */

        // ----- New code – fetch animals, build grid, wire events ----------------

        fetch("https://radufromfinland.com/animals/") // request the JSON from the API
            .then(function(response) {                 // wait for the response
                return response.json();                // parse it as JSON
            })
            .then(function(data) {                      // data is now the array of animals
                console.log(data);                      // inspect it
                // ----------------------------------------------------------------
                // Create 100 random animal objects (Dog or Cat) from the fetched data
                const animals = [];                    // will hold the instances
                const count = 100;                      // we need exactly 100 animals
                for (let i = 0; i < count; i++) {      // loop 100 times
                    // Pick a random animal name from the API data
                    const idx = Math.floor(Math.random() * data.length);
                    const name = data[idx].name; // assume each item has a 'name' field
                    // Randomly decide whether this animal is a Dog or a Cat
                    const isDog = Math.random() < 0.5;
                    // Create the instance with dummy properties
                    if (isDog) {
                        const d = new Dog(name, 3 + Math.floor(Math.random() * 7), "brown", "black");
                        animals.push(d);
                    } else {
                        const c = new Cat(name, 3 + Math.floor(Math.random() * 7), "gray", "black");
                        animals.push(c);
                    }
                }
                // ----------------------------------------------------------------
                // Grab the grid container from the DOM
                const grid = document.getElementById("grid");
                // Create a cell for every animal
                animals.forEach(function(animal, index) {
                    const cell = document.createElement("div"); // a div that holds the canvas
                    cell.className = "cell";
                    // Render the animal to a canvas and append it
                    const canvas = animal.render();
                    cell.appendChild(canvas);
                    // Wire the onmousedown event: talk + play noise
                    cell.addEventListener("mousedown", function() {
                        animal.talk();                         // animal speaks
                        // Pick the appropriate sound based on the animal's class
                        if (animal instanceof Dog) {
                            document.getElementById("dog-bark").play();
                        } else {
                            document.getElementById("cat-meow").play();
                        }
                    });
                    // Finally add the cell to the grid
                    grid.appendChild(cell);
                });
            })
            .catch(function(err) {                          // any network or parse errors
                console.error(err);                         // show the error
            });

        /* ------------------- Variant 2 (commented out) ---------------------------
        async function fetchData() {                       // async function to use await
            try {
                const response = await fetch("https://radufromfinland.com/animals/"); // fetch data
                const data = await response.json();                    // parse JSON
                console.log(data);                                     // log it
            } catch(err) {                                            // catch errors
                console.error(err);                                   // display error
            }
        }
        fetchData();
        --------------------------------------------------------------------------- */

        // -------------------------------------------------------------------------
        // 4 × 25 grid container – added just after the original <div id="container">
        // (You can also create it dynamically, but an explicit tag keeps the demo simple)
    </script>
    <!-- 4 × 25 grid for the animals – one <div> per cell -->
    <div id="grid"></div>
</body>
</html>
