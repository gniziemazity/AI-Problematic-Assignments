    <script>
        myNumber = 25.2; // never define without const, let (or var)
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean; // var was "replaced" by let and const
        console.log(myBoolean, oppositeBoolean); // accepts multiple parameters
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        console.log(!42, !"ABC", ![]);
        console.log(!null, !undefined, !0); // zero is "falsy"

        // arrays are like Python lists
        const myArray = [1, 2, 3, "Academy", true, null];
        myArray.length = 0;
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        // myArray = [1, 2, 3]; ERROR! Program would fail here!
        try {
            myArray = [1, 2, 3];
        } catch(err) {
            console.error(err);
        }
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b){ return a - b; });
        console.log(myArray);

        // objects are like Python dictionaries
        const dog = {
            name: "Max",
            age: 5,
            furr: "black",
            eyes: "brown"
        };
        console.log(dog);
        console.table(dog);
        console.log(dog.name);
        dog.name = "Charlie";
        console.log(dog["name"]);

        console.log(anotherDog);

        const canvas = anotherDog.render();
        container.appendChild(canvas);
        const myCat = new Cat("Milo", 3, "gray", "green");
console.log(myCat);
myCat.talk();
const catCanvas = myCat.render();
const containerDiv = document.getElementById("container");
containerDiv.appendChild(catCanvas); /*
            no need for document.getElementById("container")
            ids that are valid JS names are automatically global variables
            invalid names:
             * start with a number
             * contain spaces or special characters (like -)
        */

        let a = 5;
        let b = 2;
        // operators
        console.log(a + b);
        a = "5";
        console.log(a + b); // concatenation
        console.log(a - b);
        console.log(a * b);
        console.log(a / b);
        console.log(a % b);
        console.log(a ** b);
        console.log(Math.pow(a, b));
        console.log(Math.sqrt(b));
        console.log(Math.pow(b, 0.5));
        console.log(b ** 0.5);

        a = Number(a) + 5;
        console.log(a);
        a += 5;
        a *= 2;
        a /= 3;
        a %= 4;
        a **= 10;
        console.log(a);

        const s1 = "Welcome to Academy!";
        const s2 = 'Welcome to "Academy"!';
        const s3 = "Welcome to \"Academy\"!"; // escaping with \
        console.log(s1, s2, s3);

        const age = 36;
        console.log("I am " + age + " years old");
        console.log(`I am ${age} years old`); // template literal

        let today = new Date();
        console.log(today);
        let someDate = new Date("August 24, 2025");
        console.log(someDate);

        console.log(today.getDay());
        switch (today.getDay()) {
            case 1: console.log("Monday"); break;
            case 2: console.log("Tuesday"); break;
            case 3: console.log("Wednesday"); break;
            case 4: console.log("Thursday"); break;
            case 5: console.log("Friday"); break;
            default: console.log("Weekend"); break;
        }
        // ===== VARIANT 1 =====
fetch("https://radufromfinland.com/animals/") // request data from API
    .then(function(response) { // runs when response is received
        return response.json(); // convert response to JSON
    })
    .then(function(data) { // runs when JSON is ready
        console.log(data); // print data to console
    })
    .catch(function(err) { // runs if error happens
        console.error(err); // print error
    });

fetchData(); // call the function
async function fetchData() { // async function to get data
    try {
        const response = await fetch("https://radufromfinland.com/animals/"); // fetch data
        const data = await response.json(); // convert to JSON

        console.log(data); // debug output

        const containerDiv = document.getElementById("container"); // get container

        // create grid
        containerDiv.style.display = "grid"; // enable grid layout
        containerDiv.style.gridTemplateColumns = "repeat(4, 1fr)"; // 4 columns
        containerDiv.style.gap = "10px"; // spacing

        for (let i = 0; i < 100; i++) { // loop 100 times

            // pick random animal from API
            const random = data[Math.floor(Math.random() * data.length)];

            let animal;

            // randomly decide Dog or Cat
            if (Math.random() < 0.5) {
                animal = new Dog(random.name, random.age, random.fur, random.eyes);
            } else {
                animal = new Cat(random.name, random.age, random.fur, random.eyes);
            }

            animal.talk(); // make animal talk (console)

            const canvas = animal.render(); // draw animal
           // Add onmousedown functionality
canvas.onmousedown = function() {
    animal.talk(); // console log
    if (animal instanceof Dog) {
        document.getElementById("dogSound").play();
    } else if (animal instanceof Cat) {
        document.getElementById("catSound").play();
    }
};

containerDiv.appendChild(canvas); // add canvas to grid
        }

    } catch(err) {
        console.error(err); // handle errors
    }
}

fetchData(); // run function
    </script>
