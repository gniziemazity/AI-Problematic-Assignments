<!DOCTYPE html>
<html>
<head>
    <title>Chess Board</title>

    <style>
        /* Board container */
        #chess-board {
            width: 450px; /* 25px + 8 cells × 50px + 25px = 450px (Task 4) */
            margin: 0 auto; /* right the board */
        }

        /* Each row */
        .row {
            clear: both;
            overflow: hidden; /* Clear floats */
        }

        /* Normal cell */
        .cell {
            width: 50px;
            height: 40px; /* Task 5: Reduced height for brick wall effect */
            float: left;
            border: 2px solid black; /* Task 5: Adjusted border thickness for brick wall effect */
            border-radius: 5px; /* Task 5: Added border-radius for brick wall effect */
            box-sizing: border-box;
        }

        /* Light color */
        .cell.light {
            background-color: white;
        }

        /* Dark color */
        .cell.dark {
            background-color: black;
        }

        /* Task 4 - Half width cell */
        .half-width {
            width: 25px;
        }

    </style>
</head>

<body>

<h1>Chess Board</h1>

<div id="chess-board">

    <!-- Row 1 (starts with light, ends with dark - Task 4: add dark half-width at end) -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell dark half-width"></div>
    </div>

    <!-- Row 2 (starts with dark - Task 4: remove left-offset, add half-width at beginning) -->
    <div class="row">
        <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

    <!-- Row 3 (starts with light, ends with dark - Task 4: add dark half-width at end) -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell dark half-width"></div>
    </div>

    <!-- Row 4 (starts with dark - Task 4: remove left-offset, add half-width at beginning) -->
    <div class="row">
        <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

    <!-- Row 5 (starts with light, ends with dark - Task 4: add dark half-width at end) -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell dark half-width"></div>
    </div>

    <!-- Row 6 (starts with dark - Task 4: remove left-offset, add half-width at beginning) -->
    <div class="row">
        <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

    <!-- Row 7 (starts with light, ends with dark - Task 4: add dark half-width at end) -->
    <div class="row">
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell dark half-width"></div>
    </div>

    <!-- Row 8 (starts with dark - Task 4: remove left-offset, add half-width at beginning) -->
    <div class="row">
        <div class="cell light half-width"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
    </div>

</div>

</body>
</html>
