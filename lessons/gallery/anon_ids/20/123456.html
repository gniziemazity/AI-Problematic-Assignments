<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson</title>
</head>
<body>
    <div id="container">
        My first Emmet abbreviations
        <ol>
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol>li*3 (ordered list with 3 items)</li>
        </ol>
        ((all folowed by Tab/ Enter))
    </div>

    <script src="https://www.radufromfinland.com/dog.js">   </script>
    <script>
        myNumber = 25.2;
        console.log(myNumber);

        const myString = "I am studing";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean;
        console.log(oppositeBoolean, myBoolean);
        oppositeBoolean = !myBoolean;
        console.log(oppositeBoolean, myBoolean);

        console.log(!42, !"ABC", ![]);

        console.log(!null, !undefined, !0);

        const myArray = [1, 2, 3, "Academy", true, null];

        myArray.length = 0;

        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        // myArray = [1,2,3]; // This will cause an error because myArray is a constant and cannot be reassigned to a new array.
        try {
            myArray = [1, 2, 3]; // This will throw an error because myArray is a constant.
        } catch (err) {
            console.error(err);
        }
        
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b) {
            return a - b;
        });

        console.log(myArray);

        const dog = {
            name: 'max',
            age: 5,
            furr: 'black',
            eys: 'brown'           
        }
        
        console.log(dog);
        console.table(dog);

        console.log(dog.name);
        dog.name = 'Charley';
        console.log(dog['name'] );


        const anotherDog = new Dog('Rex', 7, 'brown', 'black');
        console.log(anotherDog);

        anotherDog.talk();

        const canvas = anotherDog.render();
        container.appendChild(canvas);//no need to use 
        // document.getElementById('container') 
        // because we already have a reference 
        // to the container element in the variable container

        let a = 5;
        let b = 2;

        console.log(a + b); // Addition

        a = '5';
        console.log(a + b); // Concatenation (string + number)
        console.log(a - b); // Subtraction (string is coerced to number)
        console.log(a * b); // Multiplication (string is coerced to number)
        console.log(a / b); // Division (string is coerced to number)   
        console.log(a % b); // Modulus (string is coerced to number)        
        console.log(a ** b); // Exponentiation (string is coerced to number)
        console.log(Math.pow(a, b))
        console.log(Math.sqrt(b)); // Square root (string is coerced to number)
        console.log(Math.pow(b,0.5 )); // Absolute value (string is coerced to number)

        a = Number(a) +5;
        console.log(a);

        a += 5; // This is a shorthand for a = a + 5
        a *= 2; // This is a shorthand for a = a * 2
        a /= 3;
        a %= 4;
        a **= 10 ;

        console.log(a);


        const s1 = 'Welcome to Academy!';
        const s2 = 'Welcome to Academy"!';
        const s3 = `Welcome to "Academy"!`;
        console.log(s1, s2, s3);

        const age = 36;
        console.log(`I am ${age} years old.`); // Template literal with variable interpolation

        let today = new Date();
        console.log(today);

        let someDay = new Date('2024-03-10');
        console.log(someDay);

        console.log(today.getDay());

        switch (today.getDay()) {
            case 1:
                console.log("monday ");
                break
            case 2:
                console.log("tusday ");
                break
            case 3:
                console.log("It's Wednesday ");
                break
            case 4:
                console.log("It's Wednesday");
                break
            case 5:
                console.log("It's Thursday");
                break
            case 6:
                console.log("It's Friday");
                break
            case 7:
                console.log("It's Saturday");
                break
            default:
                console.log("weekend");
                break
        }
    </script>
</body>
</html>
