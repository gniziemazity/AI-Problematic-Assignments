<!DOCTYPE html>
<html>
    <head>
        Sorting Visualizer
        <style>
            body { /* make the text in the web center of the web*/
                display: flex;
                /* justify-content: center; does nothing cause of flex direction replace with align item*/
                align-items: center;
                flex-direction: column;
           }
           #vis-123456{
            /* width:200px;*/
            height:200px;
            /*background-color: red;*/
            display: flex;
            align-items: flex-end;
           }
           .bar{
            width: 7px;
            height: 100%; /* bar length */
            background-color: black;
            margin: 0px 1px;
           }
        </style>
    </head>
    <body>
        <h1>
            Sorting Visualizer
        </h1>
        <div id = "vis-123456"></div>
        <script>
            //global variables
            const count = 50; //number of bars on the website
            const array = new Array(count);

            for (let i = 0; i < count; i++){ // use array in consle to see number and count to see how many
                array[i] = Math.random(); //numbers between 0-1 ex 0.1,0.24,etc
            }


            const visualizer = document.getElementById("vis-123456");
            for( let i = 0; i <array.length; i++){
                const bar = document.createElement("div"); //create div 50 time i think ?
                visualizer.appendChild(bar); //this can be use to make chess board so i dont have to copy paste 64 block
                bar.classList.add("bar");
                bar.style.height = array[i] * 100 + "%" /* + here is string concatenation cause the 2nd item "%" is a string */
                /* make the lay out random like the line random in height*/
            }

            bubbleSort(array);

            function updateBars(){
                const bars = document.getElementsByClassName("bar");
                for (let i = 0; i < bars.length;i++){
                    bars[i].style.height = array[i] *100 + "%";
                }
            }

            async function bubbleSort(arr) {
                do {
                    var swapped = false;
                    for (let i = 1; i < arr.length; i++){
                        if (arr[i-1] > arr[i]){
                            const aux = arr[i-1];
                            arr[i-1] = arr[i];
                            arr[i] = aux;
                            swapped = true;
                            updateBars();
                            await new Promise(resolve => setTimeout(resolve, 10)); // make animation faster and slower
                        }
                    }   
                } while (swapped);
            }
        </script>
    </body>
</html>
