<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Cats and Dogs</title> <!-- tab title -->
    <style>
        /* Container styling */
        #container {
            position: relative; 
            margin: 20px;
            border: 2px solid #333;
            padding: 10px;
        }
        /* Gallery header */
        h1 {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>100 Cats and Dogs</h1> <!--  title -->
    </div>

    <!-- Audio elements for dog and cat -->
    <audio id="dogSound" src="sounds/dog.mp3"></audio>
    <audio id="catSound" src="sounds/cat.mp3"></audio>

    <!-- Dog class -->
    <script src="https://www.radufromfinland.com/dog.js"></script>

    <!-- Cat class -->
    <script src="cat.js"></script>

    <script>
        // (Variant 2 chosen)
// -----------------------------
/*
// Variant 1 (commented out)
fetch("https://radufromfinland.com/animals/")             // fetch data from server
    .then(response => response.json())                    // parse JSON
    .then(data => console.log(data))                      // log data
    .catch(err => console.error(err));                    // handle errors
*/

async function fetchData() {
    try {
        const response = await fetch("https://radufromfinland.com/animals/"); // fetch server data
        const data = await response.json();                                    // parse JSON
        console.log(data);                                                     // log data
    } catch(err) {
        console.error(err);                                                    // log errors
    }
}
fetchData(); // call the async function


        // -----------------------------
        // Generate 100 random animals
        // -----------------------------
        const animals = [];                                           // array for animals
        const animalTypes = ["Dog", "Cat"];                           // types
        const colors = ["brown", "gray", "black", "orange"];          // fur colors
        const eyeColors = ["green", "blue", "brown"];                 // eye colors

        for(let i=0;i<100;i++){                                       // loop 100 times
            const type = animalTypes[Math.floor(Math.random()*animalTypes.length)]; // random type
            const name = type + i;                                     // name like Dog0, Cat1
            const age = Math.floor(Math.random()*10)+1;               // age 1-10
            const color = colors[Math.floor(Math.random()*colors.length)]; // random color
            const eyes = eyeColors[Math.floor(Math.random()*eyeColors.length)]; // random eyes

            if(type === "Dog"){                                       // if dog
                animals.push(new Dog(name, age, color, eyes));        // create Dog object
            } else {                                                  // else cat
                animals.push(new Cat(name, age, color, eyes));        // create Cat object
            }
        }

        // -----------------------------
        // Draw 4 x 25 grid with spacing + onclick sounds
        // -----------------------------
        const canvasSize = 100;                                       // canvas size
        const spacing = 10;                                           // spacing between animals
        const gridCols = 25;                                          // 25 columns
        const gridRows = 4;                                           // 4 rows
        const container = document.getElementById("container");       // get container div

        // adjust container size for spacing
        container.style.width = gridCols*(canvasSize + spacing) + "px";
        container.style.height = gridRows*(canvasSize + spacing) + "px";

        for(let i=0;i<animals.length;i++){                             // loop all animals
            const canvas = animals[i].render();                       // render each animal
            canvas.style.position = "absolute";                       // absolute positioning
            canvas.style.left = (i % gridCols) * (canvasSize + spacing) + "px"; // column
            canvas.style.top = Math.floor(i / gridCols) * (canvasSize + spacing) + "px"; // row

            // onmousedown triggers talk method + plays sound
            canvas.onmousedown = function() {
                animals[i].talk();                                     // call talk()
                if(animals[i] instanceof Dog){                        // if dog
                    document.getElementById("dogSound").play();       // play dog sound
                } else {                                              // else cat
                    document.getElementById("catSound").play();       // play cat sound
                }
            };

            container.appendChild(canvas);                             // append canvas
        }

        console.log("100 Cats and Dogs loaded!");                     // log success
    </script>
</body>
</html>
