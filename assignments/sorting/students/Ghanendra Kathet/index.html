<!DOCTYPE html>
<html>
<head>
    <title>Sorting Visualizer</title>
    <!-- Link to the external CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Sorting Visualizer</h1>

<div id="vis-123456"></div>

 <!-- Label describing the speed slider -->
<label for="speedRange">Speed:</label>
<!-- Range slider used to control the animation speed -->
<!-- onchange calls the changeSpeed() function in JavaScript -->

<input type="range" id="speedRange" min="10" max="500" value="100" onchange="changeSpeed(this.value)">

<!-- Link to the external JavaScript file that controls sorting and animation -->
<script src="script.js"></script>

</body>
</html>
