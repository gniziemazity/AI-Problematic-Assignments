<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals Grid</title>
</head>
<body>

<div id="container"></div>

<!-- Teacher's Dog class -->
<script src="https://www.radufromfinland.com/dog.js"></script>

<!-- Your Cat class -->
<script src="cat.js"></script>

<!-- Main script -->
<script>
const container = document.getElementById("container");

// ---------------- FETCH DATA ----------------

// Variant 1 (commented)
/*
fetch("https://radufromfinland.com/animals/")
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        console.log(data);
    })
    .catch(function(err) {
        console.error(err);
    });
*/

// Variant 2 (used)
async function fetchData() {
    try {
        const response = await fetch("https://radufromfinland.com/animals/");
        const data = await response.json();
        console.log(data);

        createGrid(data);

    } catch(err) {
        console.error(err);
    }
}

fetchData();

// ---------------- SOUNDS ----------------

const dogSound = new Audio("dog.mp3.mp3");
const catSound = new Audio("cat.mp3.mp3");

// ---------------- GRID ----------------

function createGrid(data) {
    let rows = 4;
    let cols = 25;
    let index = 0;

    for (let i = 0; i < rows; i++) {
        let rowDiv = document.createElement("div");

        for (let j = 0; j < cols; j++) {

            let animalData = data[index % data.length];

            let animal;

            if (Math.random() > 0.5) {
                animal = new Dog(animalData.name, animalData.age, "brown", "black");
            } else {
                animal = new Cat(animalData.name, animalData.age);
            }

            const canvas = animal.render();

            canvas.onmousedown = function() {
                animal.talk();

                if (animal instanceof Cat) {
                    catSound.play();
                } else {
                    dogSound.play();
                }
            };

            rowDiv.appendChild(canvas);
            index++;
        }

        container.appendChild(rowDiv);
    }
}
</script>

</body>
</html>
