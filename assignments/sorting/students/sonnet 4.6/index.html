<!DOCTYPE html>
<html>
    <head>
        <title>Sorting Visualizer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Sorting Visualizer</h1>

        <div id="controls">
            <label for="speed-slider">Speed (delay ms):</label>
            <input type="range" id="speed-slider" min="1" max="200" value="50">
            <span id="speed-display">50</span>
        </div>

        <div id="vis-container">
            <span id="motorcycle">🏍️</span>
            <div id="vis-123456"></div>
        </div>

        <div id="status"></div>

        <script src="script.js"></script>
    </body>
</html>
