<!DOCTYPE html>
<html>
    <head>
        <title>Chess Board</title>
        <style>
            /* styling by ID */
            #chess-board {
                width: 425px;
                display: flex;
                flex-wrap: wrap;
            }
            /* CSS class */
            .cell {
                height: 28px;
                width: 50px;
                /* commented styling - not in use - just an example
                margin: 10px;
                padding: 5px; */
                border: 3px solid gray;
                border-radius: 4px;
                box-sizing: border-box; /* size includes padding and border */
            }
            .light {
                background-color: #e63946;
            }
            .dark {
                background-color: #7d1620;
            }
            .half-width {
                width: 25px;
            }
       </style>
    </head>
    <body>
        <h1>Chess Board</h1>
        <div id="chess-board">
            <!-- Row 1: starts light, ends dark -> half-width cell at END -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>

            <!-- Row 2: starts dark -> half-width cell at BEGINNING -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 3: starts light, ends dark -> half-width cell at END -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>

            <!-- Row 4: starts dark -> half-width cell at BEGINNING -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 5: starts light, ends dark -> half-width cell at END -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>

            <!-- Row 6: starts dark -> half-width cell at BEGINNING -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 7: starts light, ends dark -> half-width cell at END -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light half-width"></div>

            <!-- Row 8: starts dark -> half-width cell at BEGINNING -->
            <div class="cell light half-width"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
        </div>
        <!-- div with Inline Style (not recommended)
        <div style="height: 50px;
            background-color: black;
            width: 50px;"
        ></div> -->
        <a href="https://www.w3schools.com" target="_blank">
            Visit W3Schools.com!
        </a>
    </body>
 </html>
