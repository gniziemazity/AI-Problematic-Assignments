<!DOCTYPE html>
<html>
    <head>
        <title>Chess 123456</title>
        <style>
            .cell  { 
                border: 2px solid black;
                display: flex;
                align-items: center;
                justify-content: center; 
                /* Style Improvement: Smooth transitions and pointer cursor for better UX */
                cursor: pointer;
                transition: background-color 0.2s, border 0.1s;
                box-sizing: border-box;
            }

            /* Style Improvement: Upgraded standard white/gray to classic wood-toned chess colors */
            .light { background-color: #f0d9b5; }
            .dark  { background-color: #b58863; }

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr);
                grid-template-columns: repeat(8, 1fr);
                border: 4px solid #332418; /* Clean outer border */
            }

            img {
                width: 75%; /* Style Improvement: Increased size slightly to fit the grid beautifully */
                user-select: none; /* Prevents accidental image dragging highlights */
            }
            .invert-color {
                filter: invert(100%);
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>

        <div id="chess-board">
            <div class="cell light"><img src="pieces/p4.png" class="invert-color" /></div> <div class="cell dark"><img src="pieces/p3.png" class="invert-color" /></div>  <div class="cell light"><img src="pieces/p2.png" class="invert-color" /></div> <div class="cell dark"><img src="pieces/p5.png" class="invert-color" /></div>  <div class="cell light"><img src="pieces/p6.png" class="invert-color" /></div> <div class="cell dark"><img src="pieces/p2.png" class="invert-color" /></div>  <div class="cell light"><img src="pieces/p3.png" class="invert-color" /></div> <div class="cell dark"><img src="pieces/p4.png" class="invert-color" /></div>  <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            
            <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div>
            <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div>
            
            <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div>
            <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div>
            
            <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div>
            <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div>
            
            <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div>
            <div class="cell dark"></div> <div class="cell light"></div> <div class="cell dark"></div> <div class="cell light"></div>
            
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            
            <div class="cell dark"><img src="pieces/p4.png" /></div>  <div class="cell light"><img src="pieces/p3.png" /></div> <div class="cell dark"><img src="pieces/p2.png" /></div>  <div class="cell light"><img src="pieces/p5.png" /></div> <div class="cell dark"><img src="pieces/p6.png" /></div>  <div class="cell light"><img src="pieces/p2.png" /></div> <div class="cell dark"><img src="pieces/p3.png" /></div>  <div class="cell light"><img src="pieces/p4.png" /></div> </div>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            
            // method 8
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
    </body>
</html>
