<!DOCTYPE html>
<html>
    <head>
        <title>Chess Board</title>
        <style>
            /* styling by ID */
            #chess-board {
                width: 425px;
                display: flex;
                flex-wrap: wrap;
            }
            /* CSS class */
            .row {
                display: flex;
            }
            .cell {
                height: 20px;
                width: 50px;
                /* commented styling - not in use - just an example 
                margin: 10px;
                padding: 5px; */
                border: 3px solid grey;
                box-sizing: border-box; /* size includes padding and border */
                border-radius: 5px;
            }
            .light {
                background-color: #EA420D;
            }
            .dark {
                background-color: #AD2C05;
            }
            .half-width{
                width: 25px;
            }
        </style>
    </head>

        <h1>Chess Board</h1>

        <div id="chess-board">

                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light half-width"></div>
            </div>

            </div>

            <div class="row">
                <div class="cell light half-width"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>
                <div class="cell light"></div>
                <div class="cell dark"></div>

            <div class="row">
                <div class="cell light"></div>

                <div class="cell dark"></div>
                <div class="cell light"></div>

            <div class="row">

                <div class="cell light"></div>
