<!-- The game works as expected: you can select a piece and move it to any square, but there are no move rules, turn order, or capturing logic implemented yet. -->

<!DOCTYPE html>
<html>
    <head>
        <title>Chess 123456</title>
        <style>
            .cell  { 
                border: 2px solid black;
                display: flex;
                align-items: center;
                justify-content: center; 
                width: 50px;
                height: 50px;
            }

            .light { background-color: white; }
            .dark  { background-color: gray;  }

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr);
                grid-template-columns: repeat(8, 1fr);
            }

            img {
                width: 80%;
                height: auto;
            }
            .invert-color {
                filter: invert(100%);
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>

        <div id="chess-board">
            <!-- Row 8 (black back rank) -->
            <div class="cell dark"><img src="pieces/p7.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p8.png" class="invert-color"/></div>
            <div class="cell dark"><img src="pieces/p9.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p10.png" class="invert-color"/></div>
            <div class="cell dark"><img src="pieces/p11.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p9.png" class="invert-color"/></div>
            <div class="cell dark"><img src="pieces/p8.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p7.png" class="invert-color"/></div>
            
            <!-- Row 7 (black pawns) -->
            <div class="cell dark"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell dark"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell dark"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell dark"><img src="pieces/p12.png" class="invert-color"/></div>
            <div class="cell light"><img src="pieces/p12.png" class="invert-color"/></div>
            
            <!-- Row 6 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            
            <!-- Row 5 -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            
            <!-- Row 4 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            
            <!-- Row 3 -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            
            <!-- Row 2 (white pawns) -->
            <div class="cell light"><img src="pieces/p6.png"/></div>
            <div class="cell dark"><img src="pieces/p6.png"/></div>
            <div class="cell light"><img src="pieces/p6.png"/></div>
            <div class="cell dark"><img src="pieces/p6.png"/></div>
            <div class="cell light"><img src="pieces/p6.png"/></div>
            <div class="cell dark"><img src="pieces/p6.png"/></div>
            <div class="cell light"><img src="pieces/p6.png"/></div>
            <div class="cell dark"><img src="pieces/p6.png"/></div>
            
            <!-- Row 1 (white back rank) -->
            <div class="cell dark"><img src="pieces/p1.png"/></div>
            <div class="cell light"><img src="pieces/p2.png"/></div>
            <div class="cell dark"><img src="pieces/p3.png"/></div>
            <div class="cell light"><img src="pieces/p4.png"/></div>
            <div class="cell dark"><img src="pieces/p5.png"/></div>
            <div class="cell light"><img src="pieces/p3.png"/></div>
            <div class="cell dark"><img src="pieces/p2.png"/></div>
            <div class="cell light"><img src="pieces/p1.png"/></div>
        </div>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            // method 8
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
    </body>
</html>
