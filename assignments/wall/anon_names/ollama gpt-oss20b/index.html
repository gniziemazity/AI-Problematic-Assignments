<!DOCTYPE html>
<html>
<head>
    <title>Chess Board</title>
    <style>
        /* board container */
        #chess-board {
            width: 400px;          /* back to 400px after removing half‑cells */
            display: flex;
            flex-wrap: wrap;
        }
        /* cell base style */
        .cell {
            height: 45px;               /* reduced height */
            width: 50px;                /* normal cell width */
            border: 2px solid #444;     /* thicker, darker border */
            border-radius: 4px;         /* rounded corners */
            box-sizing: border-box;
        }
        /* colours (video timestamps) */
        .light { background-color: #ffdddd; }
        .dark  { background-color: #aa0000; }
        /* half‑cell width for the extra “light” cells */
        .half-width { width: 25px; }
    </style>
</head>
<body>
    <h1>Chess Board</h1>
    <div id="chess-board">

        <!-- Row 1 – starts with light -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 2 – starts with dark; add a half‑light cell at the start -->
        <div class="cell half-width light"></div>  <!-- half‑light start -->
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell half-width light"></div>  <!-- half‑light end -->

        <!-- Row 3 – starts with light -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 4 – starts with dark -->
        <div class="cell half-width light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell half-width light"></div>

        <!-- Row 5 – starts with light -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 6 – starts with dark -->
        <div class="cell half-width light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell half-width light"></div>

        <!-- Row 7 – starts with light -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <!-- Row 8 – starts with dark -->
        <div class="cell half-width light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell half-width light"></div>
    </div>

    <a href="https://www.w3schools.com" target="_blank">
        Visit W3Schools.com!
    </a>
</body>
</html>
