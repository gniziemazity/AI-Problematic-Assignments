<!DOCTYPE html>

<!-- The game works, but there was a problem:
Cells were replacing each other's content when moving pieces, so pieces kept
overwriting one another. After several moves only one piece remained on the board. -->

<html>

        .cell {

            user-select: none;

        .invert-color {
            filter: invert(100%);
        }

        h1 {
            color: #141212;
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }

        h1:hover {
            color: #ff3700;
            text-shadow: 5px 8px 15px black;

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            /*Method 5*/
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
