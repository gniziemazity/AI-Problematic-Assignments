<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Board - XXX-homework1</title>

<style>
body {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

#chess-board {
  width: 450px;
}

.row {
  display: flex;
}

.cell {
  width: 50px;
  height: 30px;
  border: 2px solid black;
  border-radius: 4px;/* rounded corners*/ 
}

.light {
  background-color: rgb(228, 219, 219);   
}

.dark {
  background-color: rgb(21, 20, 20);   
}

.left-offset {
  margin-left: 25px;
}
</style>
</head>

<body>

<div id="chess-board">

  <!-- Row 1 -->
  <div class="row">
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
  </div>

  <!-- Row 2 -->
  <div class="row">
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
  </div>

  <!-- Row 3 -->
  <div class="row">
    <div class="cell light"></div>
    <div class="cell dark"></div>

    <div class="cell dark"></div>

    <div class="cell dark"></div>

  <!-- Row 4 -->

    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
  </div>

  <!-- Row 5 -->
  <div class="row">
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>
  </div>

  <!-- Row 6 -->
  <div class="row">

    <div class="cell light"></div>

    <div class="cell dark"></div>

    <div class="cell dark"></div>
    <div class="cell light"></div>
    <div class="cell dark"></div>

  </div>

</div>

</html>
