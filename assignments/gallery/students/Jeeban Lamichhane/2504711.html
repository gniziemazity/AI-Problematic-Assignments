            //variant 1
            /*
            fetch("https://radufromfinland.com/animals/") // getdata from server

               //variant 2
               async function fetchAnimals() {
                   try {
                       const response = await fetch("https://radufromfinland.com/animals/");  // get data from server
                       const data = await response.json();    // turn it into JSON 
                       console.log(data);    // show data
                       return data;  // return the data for later use
                   } catch(err) {
                       console.error(err);  // show any errors
                       return [];   //return empty array if error occurs
                   }
               }
               fetchAnimals().then(animalsData => {  
                  const screenWidth = window.innerWidth;  
                  const screenHeight = window.innerHeight * 0.7; 

                   const gridCanvas = document.createElement("canvas"); 
                   gridCanvas.width = screenWidth;  
                   gridCanvas.height = screenHeight; 
                   const ctx = gridCanvas.getContext("2d"); 
                   document.body.appendChild(gridCanvas); 

                   const rows = 4;  
                   const cols = 25; 
                   const cellWidth = gridCanvas.width / cols; 
                   const cellHeight = gridCanvas.height / rows; 

                   const animals = []; 

                   for (let i = 0; i < 100; i++) { 
                      const AnimalClass = Math.random() < 0.5 ? Cat : Dog; 
                      const name = animalsData[i % animalsData.length]?.name || `Animal${i+1}`; 
                      const age = Math.floor(Math.random() * 10) + 1; 
                      const furr = animalsData[i % animalsData.length]?.furr || "gray"; 
                      const eyes = animalsData[i % animalsData.length]?.eyes || "green"; 
                      animals.push(new AnimalClass(name, age, furr, eyes)); 
                 }

                 animals.forEach((animal, index) => { 
                     const row = Math.floor(index / cols); 
                     const col = index % cols; 
                     const x = col * cellWidth; 
                     const y = row * cellHeight; 
                     const animalCanvas = animal.render(Math.min(cellWidth, cellHeight) * 0.8); 
                     ctx.drawImage(animalCanvas, x + cellWidth * 0.1, y + cellHeight * 0.1); 
                 });

                 gridCanvas.addEventListener("mousedown", function(event) {
                     const mouseX = event.offsetX; 
                     const mouseY = event.offsetY; 

                     animals.forEach((animal, index) => { 
                        const row = Math.floor(index / cols);
                        const col = index % cols;
                        const x = col * cellWidth;
                        const y = row * cellHeight;

                        if (mouseX >= x && mouseX <= x + cellWidth &&
                            mouseY >= y && mouseY <= y + cellHeight) { 
                            animal.talk(); 
                            const audio = animal instanceof Dog ?
                                document.getElementById("dogSound") : 
                                document.getElementById("catSound");  
                            audio.currentTime = 0; 
                            audio.play(); 
                        }
                 });
         });
});
