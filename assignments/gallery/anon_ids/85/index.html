<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson - Animals</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #animalGrid {
            display: grid;
            grid-template-columns: repeat(25, 100px);
            gap: 6px;
            margin-top: 20px;
            overflow-x: auto;
        }

        canvas {
            border: 1px solid #cccccc;
            border-radius: 8px;
            cursor: pointer;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div id="container">
        My first Emmet abbreviations:
        <ol>
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol&gt;li*3 (ordered list with 3 items)</li>
        </ol>
        (all followed by Tab / Enter)
    </div>

    <h2>Random animals from the API</h2>
    <p>Press an animal to make it talk and play a sound.</p>
    <div id="animalGrid"></div>

    <script src="dog.js"></script>
    <script src="cat.js"></script>
    <script>
        myNumber = 25.2; // never define without const, let (or var)
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean; // var was "replaced" by let and const
        console.log(myBoolean, oppositeBoolean); // accepts multiple parameters
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        console.log(!42, !"ABC", ![]);
        console.log(!null, !undefined, !0); // zero is "falsy"

        // arrays are like Python lists
        const myArray = [1, 2, 3, "Academy", true, null];
        myArray.length = 0;
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        // myArray = [1, 2, 3]; ERROR! Program would fail here!
        try {
            myArray = [1, 2, 3];
        } catch(err) {
            console.error(err);
        }
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b){ return a - b; });
        console.log(myArray);

        // objects are like Python dictionaries
        const dog = {
            name: "Max",
            age: 5,
            furr: "black",
            eyes: "brown"
        };
        console.log(dog);
        console.table(dog);
        console.log(dog.name);
        dog.name = "Charlie";
        console.log(dog["name"]);

        const anotherDog = new Dog("Rex", 7, "brown", "black");
        console.log(anotherDog);
        anotherDog.talk();
        const canvas = anotherDog.render();
        container.appendChild(canvas); /*
            no need for document.getElementById("container")
            ids that are valid JS names are automatically global variables
            invalid names:
             * start with a number
             * contain spaces or special characters (like -)
        */

        let a = 5;
        let b = 2;
        // operators
        console.log(a + b);
        a = "5";
        console.log(a + b); // concatenation
        console.log(a - b);
        console.log(a * b);
        console.log(a / b);
        console.log(a % b);
        console.log(a ** b);
        console.log(Math.pow(a, b));
        console.log(Math.sqrt(b));
        console.log(Math.pow(b, 0.5));
        console.log(b ** 0.5);

        a = Number(a) + 5;
        console.log(a);
        a += 5;
        a *= 2;
        a /= 3;
        a %= 4;
        a **= 10;
        console.log(a);

        const s1 = "Welcome to Academy!";
        const s2 = 'Welcome to "Academy"!';
        const s3 = "Welcome to \"Academy\"!"; // escaping with \
        console.log(s1, s2, s3);

        const age = 36;
        console.log("I am " + age + " years old");
        console.log(`I am ${age} years old`); // template literal

        let today = new Date();
        console.log(today);
        let someDate = new Date("August 24, 2025");
        console.log(someDate);

        console.log(today.getDay());
        switch (today.getDay()) {
            case 1: console.log("Monday"); break;
            case 2: console.log("Tuesday"); break;
            case 3: console.log("Wednesday"); break;
            case 4: console.log("Thursday"); break;
            case 5: console.log("Friday"); break;
            default: console.log("Weekend"); break;
        }

        /*
        // variant 1
        fetch("https://radufromfinland.com/animals/") // sends an HTTP request to the animal API
            .then(function(response) { // waits until the server responds
                return response.json(); // converts the JSON response into JavaScript data
            }) // finishes the first promise and passes the data forward
            .then(function(data) { // receives the converted JavaScript data
                console.log(data); // prints the API data in the browser console
                createRandomAnimals(data); // creates and draws the 100 animals using the API data
            }) // finishes the second promise after the data is used
            .catch(function(err) { // runs if the request or JSON conversion fails
                console.error(err); // prints the error in the browser console
                createRandomAnimals([]); // uses fallback data so the grid still appears
            }); // ends the fetch promise chain
        */

        // variant 2
        async function fetchData() { // creates an asynchronous function for reading the API data
            try { // starts a block where errors can be caught
                const response = await fetch("https://radufromfinland.com/animals/"); // sends an HTTP request and waits for the response
                const data = await response.json(); // converts the JSON response into JavaScript data and waits for it
                console.log(data); // prints the API data in the browser console
                createRandomAnimals(data); // creates and draws the 100 animals using the API data
            } catch(err) { // runs if the request or JSON conversion fails
                console.error(err); // prints the error in the browser console
                createRandomAnimals([]); // uses fallback data so the grid still appears
            } // closes the error handling block
        } // closes the asynchronous function
        fetchData(); // calls the function so the API request actually starts

        function randomChoice(items) {
            return items[Math.floor(Math.random() * items.length)];
        }

        function normalizeApiData(data) {
            if (Array.isArray(data)) {
                return data;
            }
            if (data && Array.isArray(data.animals)) {
                return data.animals;
            }
            return [];
        }

        function createRandomAnimals(apiData) {
            const apiAnimals = normalizeApiData(apiData);
            const animalGrid = document.getElementById("animalGrid");
            const names = ["Max", "Luna", "Bella", "Charlie", "Milo", "Nala", "Rex", "Coco", "Leo", "Kitty"];
            const furrColors = ["brown", "black", "gray", "orange", "goldenrod", "sienna", "white"];
            const eyeColors = ["black", "green", "blue", "brown", "gold"];
            const animals = [];

            animalGrid.innerHTML = "";

            for (let i = 0; i < 100; i++) {
                const sourceAnimal = apiAnimals.length > 0 ? randomChoice(apiAnimals) : {};
                const typeText = String(sourceAnimal.type || sourceAnimal.animal || sourceAnimal.species || randomChoice(["dog", "cat"])).toLowerCase();
                const name = sourceAnimal.name || `${randomChoice(names)} ${i + 1}`;
                const animalAge = sourceAnimal.age || Math.floor(Math.random() * 12) + 1;
                const furr = sourceAnimal.furr || sourceAnimal.fur || sourceAnimal.color || randomChoice(furrColors);
                const eyes = sourceAnimal.eyes || sourceAnimal.eyeColor || randomChoice(eyeColors);
                const animal = typeText.includes("cat") ? new Cat(name, animalAge, furr, eyes) : new Dog(name, animalAge, furr, eyes);

                animals.push(animal);
                animalGrid.appendChild(animal.render());
            }

            console.table(animals);
        }

        // Sound files are generated locally for this assignment; see sources.txt for details.
    </script>
</body>
</html>
