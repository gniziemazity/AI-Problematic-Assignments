<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Grid</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #app {
            padding: 20px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 38px;
            margin-top: 20px;
        }

        canvas {
            width: 125px;
            height: 125px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <h2>Animals</h2>
    <div id="grid"></div>
</div>

<!-- Sounds -->
<audio id="sound-cat" preload="auto">
    <source src="cat-meow.mp3" type="audio/mpeg">
</audio>

<audio id="sound-dog" preload="auto">
    <source src="dog-bark.mp3" type="audio/mpeg">
</audio>

<!-- External scripts -->
<script src="https://www.radufromfinland.com/dog.js"></script>
<script src="cat.js"></script>

<script>
    const grid = document.getElementById("grid");
    const catAudio = document.getElementById("sound-cat");
    const dogAudio = document.getElementById("sound-dog");

    function playSound(type) {
        const audio = type === "cat" ? catAudio : dogAudio;
        audio.currentTime = 0;
        audio.play().catch(err => console.error(err));
    }

    async function loadAnimals() {
        try {
            const res = await fetch("https://radufromfinland.com/animals/");
            const animals = await res.json();

            for (let i = 0; i < 100; i++) {
                const data = animals[Math.floor(Math.random() * animals.length)];

                let animalInstance;
                let kind;

                if (Math.random() < 0.5) {
                    animalInstance = new Dog(data.name, data.age, data.furr, data.eyes);
                    kind = "dog";
                } else {
                    animalInstance = new Cat(data.name, data.age, data.furr, data.eyes);
                    kind = "cat";
                }

                const element = animalInstance.render();

                element.addEventListener("mousedown", () => {
                    animalInstance.talk();
                    playSound(kind);
                });

                grid.appendChild(element);
            }

        } catch (error) {
            console.error("Failed to load animals:", error);
        }
    }

    loadAnimals();
</script>

</body>
</html>
