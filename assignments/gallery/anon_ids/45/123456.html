        function stopSound(audioE1) { // helper to replay sound from start
            audioE1.pause();  // stop if currently playing
            audioE1.currentTime = 0;  // rewind to beginning

        myBoolean = false;

            anotherDog.talk();

        const myCat = new Cat("kitty", 3, "orange", "gray");

        /*
// variant 1 // Promise-chain version (NOT chosen) 
fetch("https://radufromfinland.com/animals/") // send HTTP request to the API endpoint
    .then(function(response) { // run when the HTTP response is received
        return response.json(); // convert response body to JSON (array of animals)
    }) // end first then()
    .then(function(data) { // run when JSON parsing is done
        console.log(data); // print the JSON array to the console
    }) // end second then()
    .catch(function(err) { // run if fetch() or json() fails
        console.error(err); // print the error to the console
    }); // finish the chain
*/

// variant 2 (CHOSEN) // async/await version
    async function fetchData() { // define an async function so we can use await
        try { // start try block for error handling
        const response = await fetch("https://radufromfinland.com/animals/"); // request the API data and wait for response
        const data = await response.json(); // parse JSON from the response and wait for the result
        console.log(data); // print the received array to the console
        return data; // return the array so we can use it to create animals
    } catch (err) { // catch any network/JSON errors
        console.error(err); // print the error to the console
        return []; // return empty array so the program can continue safely
    } // end catch
  } // end fetchData

function pickRandom(arr) { // helper: pick one random element from an array
    return arr[Math.floor(Math.random() * arr.length)]; // return a random element using random index
} // end pickRandom

function stopSound(audioEl) { // helper: stop a sound immediately
    audioEl.pause(); // pause playback
    audioEl.currentTime = 0; // rewind to the beginning
} // end stopSound
function playSound(audioEl) { // helper: play a sound from the beginning
    stopSound(audioEl); // stop and rewind first (prevents long overlapping sounds)
    audioEl.loop = false; // ensure looping is off
    audioEl.play().catch(() => {}); // play sound (ignore browser autoplay errors)
} // end playSound

(async function main() { // run main immediately (IIFE) so we can await
    const animals = await fetchData(); // fetch the animals array from the API

    const containerEl = document.getElementById("container"); // get the container div
    const grid = document.createElement("div"); // create a div that will hold 100 canvases
    grid.style.display = "grid"; // use CSS grid layout
    grid.style.gridTemplateColumns = "repeat(4, 340px)"; // 4 columns (so 25 rows for 100 items)
    grid.style.gap = "10px"; // add spacing between grid cells
    grid.style.marginTop = "20px"; // add spacing above the grid
    containerEl.appendChild(grid); // add grid to the page

    for (let i = 0; i < 100; i++) { // loop 100 times to generate 100 random animals
        const a = pickRandom(animals); // pick a random record from the API array

        const type = String(a.type).toUpperCase(); // normalize type to "CAT" or "DOG"
        const animalObj = (type === "CAT") // decide which class to create
            ? new Cat(a.name, a.age, a.furr, a.eyes) // create Cat using API fields
            : new Dog(a.name, a.age, a.furr, a.eyes); // create Dog using API fields

        const canvas = animalObj.render(); // render animal to a canvas element
        canvas.style.cursor = "pointer"; // show pointer cursor on hover

        canvas.onmousedown = function () { // run when user presses mouse button on the canvas
            stopSound(dogSound); // stop dog sound if it is playing
            stopSound(catSound); // stop cat sound if it is playing
            animalObj.talk(); // call the talk() method of the clicked animal
            if (animalObj instanceof Cat) playSound(catSound); // play cat sound if it is a Cat
            else playSound(dogSound); // otherwise play dog sound
        }; // end handler

        grid.appendChild(canvas); // add the canvas to the grid
    } // end for loop
})(); // execute main immediately
