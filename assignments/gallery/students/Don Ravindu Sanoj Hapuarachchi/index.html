<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson</title>
</head>
<body>
    <div id="container">
        My first Emmet abbreviations:
        <ol>
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol>li*3 (ordered list with 3 items)</li>
        </ol>
        (all followed by Tab / Enter)
    </div>

    <!-- Dog and Cat scripts -->
    <script src="https://www.radufromfinland.com/dog.js"></script>
    <script src="cat.js"></script>

    <script>
        // ===== Dog Example =====
        const anotherDog = new Dog("Rex", 7, "brown", "black"); // create Dog
        console.log(anotherDog); // log Dog object
        anotherDog.talk(); // Dog says "Woof!"
        const dogCanvas = anotherDog.render(); // create Dog canvas
        container.appendChild(dogCanvas); // add to page

        // ===== Cat Example =====
        const myCat = new Cat("Luna", 3, "gray", "green"); // create Cat
        console.log(myCat); // log Cat object
        myCat.talk(); // Cat says "Meow!"
        const catCanvas = myCat.render(); // create Cat canvas
        container.appendChild(catCanvas); // add to page

        /* ===== Fetch Variant 1 (Promise style) =====
        fetch("https://radufromfinland.com/animals/")
            .then(function(response) { return response.json(); })
            .then(function(data) { console.log(data); })
            .catch(function(err) { console.error(err); });
        */

        // ===== Fetch Variant 2 (Async/Await style) =====
        async function fetchData() { // define async function
            try {
                const response = await fetch("https://radufromfinland.com/animals/"); // fetch API
                const data = await response.json(); // parse JSON
                console.log(data); // log fetched data

                // ===== Draw 100 random animals in 4x25 grid =====
                const animalGridCanvas = document.createElement("canvas"); // create canvas
                animalGridCanvas.width = 100 * 25; // 25 columns
                animalGridCanvas.height = 100 * 4; // 4 rows
                const ctx = animalGridCanvas.getContext("2d"); // get context
                container.appendChild(animalGridCanvas); // add canvas to page

                const animalTypes = ["Dog", "Cat", "Rabbit", "Mouse", "Fox", "Horse", "Bird"]; // example list

                for (let i = 0; i < 100; i++) { // loop 100 times
                    const x = (i % 25) * 100; // column position
                    const y = Math.floor(i / 25) * 100; // row position
                    const animalName = animalTypes[Math.floor(Math.random() * animalTypes.length)]; // random type
                    ctx.fillStyle = "lightblue"; // box color
                    ctx.fillRect(x, y, 100, 100); // draw box
                    ctx.fillStyle = "black"; // text color
                    ctx.font = "14px Arial"; // font
                    ctx.fillText(animalName, x + 10, y + 50); // draw name
                }

            } catch(err) { // catch errors
                console.error(err); // log errors
            }
        }

        fetchData(); // call function

        // ===== Existing lesson JS =====
        let myNumber = 25.2;
        console.log(myNumber);

        const myString = "I study at Karelia";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        console.log(!42, !"ABC", ![]);
        console.log(!null, !undefined, !0);

        const myArray = [1, 2, 3, "Karelia", true, null];
        myArray.length = 0;
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        try { myArray = [1, 2, 3]; } catch(err) { console.error(err); }
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b){ return a - b; });
        console.log(myArray);

        const dogObj = { name: "Max", age: 5, furr: "black", eyes: "brown" };
        console.log(dogObj);
        console.table(dogObj);
        console.log(dogObj.name);
        dogObj.name = "Charlie";
        console.log(dogObj["name"]);

        let a = 5;
        let b = 2;
        console.log(a + b);
        a = "5";
        console.log(a + b);
        console.log(a - b);
        console.log(a * b);
        console.log(a / b);
        console.log(a % b);
        console.log(a ** b);
        console.log(Math.pow(a, b));
        console.log(Math.sqrt(b));
        console.log(Math.pow(b, 0.5));
        console.log(b ** 0.5);

        a = Number(a) + 5;
        console.log(a);
        a += 5;
        a *= 2;
        a /= 3;
        a %= 4;
        a **= 10;
        console.log(a);

        const s1 = "Welcome to Karelia!";
        const s2 = 'Welcome to "Karelia"!';
        const s3 = "Welcome to \"Karelia\"!";
        console.log(s1, s2, s3);

        const age = 36;
        console.log("I am " + age + " years old");
        console.log(`I am ${age} years old`);

        let today = new Date();
        console.log(today);
        let someDate = new Date("August 24, 2025");
        console.log(someDate);

        console.log(today.getDay());
        switch (today.getDay()) {
            case 1: console.log("Monday"); break;
            case 2: console.log("Tuesday"); break;
            case 3: console.log("Wednesday"); break;
            case 4: console.log("Thursday"); break;
            case 5: console.log("Friday"); break;
            default: console.log("Weekend"); break;
        }
    </script>
</body>
</html>
