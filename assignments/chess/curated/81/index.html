<!DOCTYPE html>
<html>

    <!-- 

    When having placed all pieces, the first thing i notice is how some of the pieces take up the whole "square" that they're assigned to, 
    this due to being too tall in pixels compared to our tile size, every tile that said pieces move to expand on the height until piece is moved elsewhere,
    making the game look goofy; could be easily fixed by assigning a height value to img class. 
    In this case, 40px seems to be the perfect value for height when wanting to have all pieces fit perfectly inside of each tile.

    Game works as expected, as we haven't added "advanced" features yet; to make the game feel like real chess so to say. 
    As of current the pieces can be moved across the board at 240km/h with no logic behind how they move. 
    Also, you can eat your own pieces as we haven't defined otherwise, we would have to add code that checks whether or not selectedPiece has invert-color style, 
    and then tell the program that invert-color pieces can only eat pieces with no invert-color style, 
    and the otherway around; White can only eat Black, and Black can only eat white like in a real chess game.

    -->

    <head>
        <title>Chess 123456</title>
        <style>
            body {
                height: 100vh;  /* viewheight and viewwidth so game always covers screen, and doesn't break instantly in other resolutions */
                width: 100vw;
                display: flex;
                justify-content: center;    /* I center the game on the website */
                align-items: center;
                flex-direction: column; /* I use this to make the elements go above each other, h1 tag goes over chessboard */
                margin: 0;  /* remove scrollbars */
            }

            .cell {
                border: 2px solid black;
                display:flex;
                justify-content:center;
                align-items:center;
            }

            .light {
                background-color: white;
            }
            .dark {
                background-color: gray;
            }

            img {
            width: 50%;
            height: 40px;   /* I give a height value to the pieces so they look good inside the tiles and don't take up any more space than intended */
            }

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                border:2px solid black; /* I gave the board a 2px solid black border, follows the theme of tiles + looks better imo */
                grid-template-rows: repeat(8, 1fr); /* 1 fraction */
                grid-template-columns: repeat(8, 1fr)
            }

            .invert-color {
                filter:invert(75%); /* Lastly i decrease the invert %, making the pieces look gray-ish instead of plain white so we can see them on our white tiles */
            }
            </style>
    </head>

        <script>
            let selectedPiece = null;

            const cells = document.getElementsByClassName("cell");
            console.log("cells");

            // first for of loop is directly under console.log("cells"), and is mentioned in method 5 at -10:19 in the video.
            
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                }
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }   
            }
        </script>
