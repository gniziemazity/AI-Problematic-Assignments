<!-- The chess game has a bug where it incorrectly replaces it's own pieces  -->

<!DOCTYPE html>
<html>
    <head>
        <title>chess 2504732</title>
        <style>
            .cell { 
                display: flex;
                align-items: center;
                justify-content: center;
            }
              /* I changed the .light background colour and .dark background colour as written below.*/
            .light {background-color: rgb(91, 88, 88); }
            .dark { background-color: gray; }

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                border: 10px solid black;
                grid-template-rows: repeat(8, 1fr); /* 1 fraction */
                grid-template-columns: repeat(8, 1fr);
            }
            img {
                width: 50%;
            }
            .invert-color {
                filter: invert(100%);
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>
        
        <div id="chess-board">
            <!-- Row1 -->
            <div class="cell light" ><img src="png images/rook.png"> </div>
            <div class="cell dark"><img src="png images/knight.png"></div>
            <div class="cell light"><img src="png images/bishop.png"></div>
            <div class="cell dark"><img src="png images/queen.png"></div>
            <div class="cell light"><img src="png images/king.png"></div>
            <div class="cell dark"><img src="png images/bishop.png"></div>
            <div class="cell light"><img src="png images/knight.png"></div>
            <div class="cell dark"><img src="png images/rook.png"></div>
            <!-- Row2 -->
            <div class="cell dark"><img src="png images/pawn.png"></div>
            <div class="cell light"><img src="png images/pawn.png"></div>
            <div class="cell dark"><img src="png images/pawn.png"></div>
            <div class="cell light"><img src="png images/pawn.png"></div>
            <div class="cell dark"><img src="png images/pawn.png"></div>
            <div class="cell light"><img src="png images/pawn.png"></div>
            <div class="cell dark"><img src="png images/pawn.png"></div>
            <div class="cell light"><img src="png images/pawn.png"></div>
           
            <!-- Row3 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row4 -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <!-- Row5 -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row6  -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <!-- Row7 -->
            <div class="cell light"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/pawn.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/pawn.png" class="invert-color" ></div>
            <!-- Row8 -->
            <div class="cell dark"><img src="png images/rook.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/knight.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/bishop.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/queen.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/king.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/bishop.png" class="invert-color" ></div>
            <div class="cell dark"><img src="png images/knight.png" class="invert-color" ></div>
            <div class="cell light"><img src="png images/rook.png" class="invert-color" ></div>
        </div>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            //5th method from the given video.
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }
            function handleClick(element) {
                for (const cell of cells) {
                     cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
    </body>
</html>
