        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                //Task #3//
            //=  #5th loop featured in video =
            //  FOR of LOOP - For every number of the array we add it to the sum <----featured at 8:16 //
            //Extra information://
            //The for of loop looks nicer because its shorter , identifies number, if it is long//
            //ISSUE://
            // if index is later needed then some work must be done to obtain it making the loop longer//
            //in for loop conditions may be added. e.g using a value 'i = 0' then incrementing i ´so as to check if i  % 2 == 0 then even number//

                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
