<!DOCTYPE html>
<html>
<head>
    <title>Chess Game</title>
    <style>
        .cell  { 
            border: 1px solid #888;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;  
        }

        .light { background-color: #faf3dd; }
        .dark  { background-color: #8b5a2b; }

        #chess-board {
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
        }

        img {
            width: 50%;
            pointer-events: none;   /* Prevent dragging/selecting pieces and set size */        
            user-select: none;  
        }

        .invert-color {
            filter: invert(100%);
        }
    </style>
</head>
<body>
    <h1>Chess Game</h1>

    <div id="chess-board">
        
        <div class="cell light"><img src="pieces/rook.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/knight.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/bishop.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/queen.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/king.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/bishop.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/knight.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/rook.png" class="invert-color" /></div>

        <div class="cell dark"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell dark"><img src="pieces/pawn.png" class="invert-color" /></div>
        <div class="cell light"><img src="pieces/pawn.png" class="invert-color" /></div>

        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>

        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>

        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>

       <div class="cell dark"><img src="pieces/pawn.png" /></div>
        <div class="cell light"><img src="pieces/pawn.png" /></div>
        <div class="cell dark"><img src="pieces/pawn.png" /></div>
        <div class="cell light"><img src="pieces/pawn.png" /></div>
        <div class="cell dark"><img src="pieces/pawn.png" /></div>
        <div class="cell light"><img src="pieces/pawn.png" /></div>
        <div class="cell dark"><img src="pieces/pawn.png" /></div>
        <div class="cell light"><img src="pieces/pawn.png" /></div>

         <div class="cell light"><img src="pieces/rook.png" /></div>
        <div class="cell dark"><img src="pieces/knight.png" /></div>
        <div class="cell light"><img src="pieces/bishop.png" /></div>
        <div class="cell dark"><img src="pieces/queen.png" /></div>
        <div class="cell light"><img src="pieces/king.png" /></div>
        <div class="cell dark"><img src="pieces/bishop.png" /></div>
        <div class="cell light"><img src="pieces/knight.png" /></div>
        <div class="cell dark"><img src="pieces/rook.png" /></div>

    </div>

    <script>
        let selectedPiece = null;
        const cells = document.getElementsByClassName("cell");
            // method 8
        for (const cell of cells) {
            cell.onclick = function () {
                handleClick(cell);
            };
        }

        function handleClick(element) {
            for (const cell of cells) {
                cell.style.border = "";
            }

            if (selectedPiece != null) {
                element.replaceChildren(selectedPiece);
                selectedPiece = null;
            } else if (element.children.length > 0) {
                selectedPiece = element.children[0];
                element.style.border = "4px solid red";
            }
        }
    </script>
</body>
</html>
