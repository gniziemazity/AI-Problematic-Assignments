<!DOCTYPE html>
<!--
    Question 2: Does the game work as expected?
    The board displays correctly and pieces can be picked up and moved by
    clicking a piece and then clicking a destination cell. However, it does
    NOT work as a real chess game:
      - There are no rules: any piece can move to any square in any direction.
      - There is no turn system (white/black alternating).
      - There is no legal-move validation and no check/checkmate detection.
      - Captures are not validated: dropping a piece onto an occupied cell
        simply deletes whatever was there, even one of your own pieces.
      - Once a piece is selected you cannot deselect it; clicking an empty
        cell always places the piece instead of cancelling the selection.
    So it works as a free "piece mover", but not as a proper chess game.
-->
<html>
    <head>
        <title>Chess 123456</title>
        <style>
            .cell  {
                border: 2px solid black;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .light { background-color: #f0d9b5; }   /* classic light square */
            .dark  { background-color: #b58863; }    /* classic dark square  */

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr); /* 1 fraction */
                grid-template-columns: repeat(8, 1fr);
                margin: 0 auto;                      /* centre the board */
            }

            img {
                width: 70%;          /* slightly larger pieces, easier to see */
                cursor: pointer;
            }
            .invert-color {
                filter: invert(100%);
            }

            body { font-family: sans-serif; text-align: center; }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>

        <div id="chess-board">
            <!-- Row 8: black back rank (rook, knight, bishop, queen, king, bishop, knight, rook) -->
            <div class="cell light"><img src="pieces/p4.png" /></div>
            <div class="cell dark"><img src="pieces/p2.png" /></div>
            <div class="cell light"><img src="pieces/p3.png" /></div>
            <div class="cell dark"><img src="pieces/p5.png" /></div>
            <div class="cell light"><img src="pieces/p6.png" /></div>
            <div class="cell dark"><img src="pieces/p3.png" /></div>
            <div class="cell light"><img src="pieces/p2.png" /></div>
            <div class="cell dark"><img src="pieces/p4.png" /></div>

            <!-- Row 7: black pawns -->
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>
            <div class="cell dark"><img src="pieces/p1.png" /></div>
            <div class="cell light"><img src="pieces/p1.png" /></div>

            <!-- Row 6: empty -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 5: empty -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 4: empty -->
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>

            <!-- Row 3: empty -->
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>
            <div class="cell dark"></div>
            <div class="cell light"></div>

            <!-- Row 2: white pawns -->
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p1.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p1.png" class="invert-color" /></div>

            <!-- Row 1: white back rank -->
            <div class="cell dark"><img src="pieces/p4.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p2.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p3.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p5.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p6.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p3.png" class="invert-color" /></div>
            <div class="cell dark"><img src="pieces/p2.png" class="invert-color" /></div>
            <div class="cell light"><img src="pieces/p4.png" class="invert-color" /></div>
        </div>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);

            // method 8
            // (In the video, the for...of loop was presented as method number 8.)
            for (const cell of cells) {
                cell.onclick = function () { // anonymous function
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
            }
        </script>
    </body>
</html>
