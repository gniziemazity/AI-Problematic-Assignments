<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Grid</title>
    <style>
        #container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px; /* tight spacing */
            justify-items: center;
            align-items: center;
            padding: 0;
        }
    </style>
</head>
<body>
    <h1>Cats and Dogs </h1>
    <div id="container"></div>
   
    <script src="https://www.radufromfinland.com/dog.js"></script>
    <script src="cat.js"></script>
    <script src="main.js"></script>
    
    <audio id="dogsound" src="bark.mp3"></audio>
    <audio id="catsound" src="meow.mp3"></audio>
    
     </body>
</html>
