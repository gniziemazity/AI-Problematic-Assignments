<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript lesson</title>
</head>
<body>
    <div id="container">
        My first Emmet abbreviations:
        <ol> 
            <li>! (HTML boilerplate)</li>
            <li>div#container (div with id)</li>
            <li>ol>li*3 (ordered list with 3 items)</li>
        </ol>
        (all followed by Tab / Enter)
    </div>

    <script src="https://www.radufromfinland.com/dog.js"></script>
    <script>
        myNumber = 25.2; //never define without const, let or var !!!!""1!!1!!
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean; //var was replaced by let with this line
        console.log(myBoolean, oppositeBoolean); //accepts multiple parameters 
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean); //values are now flipped

        console.log(!42, !"ABC", ![]) //ANYTHING CAN BE NEGATED!! ALL OF THESE BECOME FALSE DESPITE BEING REAL. ALL OF THEM!!!!!!
        console.log(!null, !undefined, !0); //and all of these becmome true despite being false. I fixed my caps lock

        //arrays are like Python lists
        const myArray = [1,2,3, "Academy", true, null];
        myArray.length = 0; //makes the arrays contents empty
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7; //fills the blanked out array
        // myArray = [1,2,3]; this would cause a crash because the array is a const. Dont do this. 
        try {
            myArray = [1, 2, 3]; //allows you to handle errors because it catches and tries, doesn't force it. program can proceed normally.
        } catch(err){
            console.error(err)
        }
        myArray.push(6); //adds there to the array
        myArray.push(11); //sorting mistakes this for a 1.
        myArray.sort(function(a, b){return a - b;}); //I suggest reading future documentartions because this gets confusing fast
        // the sort above fixes the number order. now 11 is the higher than 9.
        console.log(myArray);

        //objects are like Python dictionaries
        const dog = {
            name: "Max",
            age: 5,
            fur: "black",
            eyes: "brown"
        };
        console.log(dog);
        console.table(dog);
        console.log(dog.name);
        dog.name = "Charlie";
        console.log(dog['name']);

        const anotherDog = new Dog("Rex", 7, "brown", "black");
        console.log(anotherDog);
        anotherDog.talk();
        const canvas = anotherDog.render();
        container.appendChild(canvas); /* log at the console in the browser if you get confused
        container is a global variable, it just works. no need for getElementById
        ids that are valid JS names are autommatically global variables
        invalid names start with numbers or spaces / special characters.  */


        let a = 5;
        let b = 2;
        console.log(a * b);
        console.log(a - b);
        console.log(a*b);
        console.log(a / b);
        console.log( a % b);
        console.log(a**b);
        console.log(Math.pow(a,b));
        console.log(Math.sqrt(b));
        console.log(Math.pow(b, 0.5));
        console.log(b ** 0.5);

        a = Number(a) + 5;
        console.log(a);
        a += 5;
        a *= 2;
        a /= 3;
        a %= 4;
        a **= 10;
        console.log(a);

        const s1 = "Welcome to Academy!";
        const s2 = "Welcome to 'Academy'!";
        const s3 = "Welcome to \"Academy\'!'";

        const age = 36;
        console.log("I am" + age + "years old");
        console.log(`I am ${age} years old`);

        let today = new Date();
        console.log(today);
        let someDate = new Date("August 24, 2025)");
        console.log(someDate);

        console.log(today.getDay());
        switch (today.getDay()) {
            case 1: console.log("Monday"); break;
            case 2: console.log("Tuesday"); break;
            case 3: console.log("Wednesday"); break;
            case 4: console.log("Thursday"); break;
            case 5: console.log("Friday"); break;
            default: console.log("Weekend"); break;
        }
    </script>
</body>
</html>
