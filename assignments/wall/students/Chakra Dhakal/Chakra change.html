<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Step 2 — half-width cells</title>
  <style>
    #chess-board { width: 450px; margin:20px; }
    .row { display:flex; }
    .cell { 
      width:50px; 
      height:50px; 
      box-sizing:border-box; 
      border:2px solid #333; 
    }
    .half-width { width:25px; }
    .light { background:#ff4d4d; }   /* bright red */
    .dark { background:#990000; }    /* dark red */
  </style>
</head>
<body>
  <h3>Step 2 — Using .half-width cells instead of left-offset</h3>
  <div id="chess-board">

    <!-- Row 1 (starts dark, ends light) -->
    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <!-- Row 2 (starts light, ends dark) -->
    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <!-- Row 4 -->
    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

    <!-- Row 5 -->
    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <!-- Row 6 -->
    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

    <!-- Row 7 -->
    <div class="row">
      <div class="cell light half-width"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
      <div class="cell dark"></div><div class="cell light"></div>
    </div>

    <!-- Row 8 -->
    <div class="row">
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light"></div><div class="cell dark"></div>
      <div class="cell light half-width"></div>
    </div>

  </div>
</body>
</html>
