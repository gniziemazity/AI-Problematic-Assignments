<!DOCTYPE html>
<html>
	<head>
		<title>Sorting Visualizer</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<h1>Sorting Visualizer</h1>

		<div id="vis-123456"></div>

		<div id="controls">
			<label for="speed-slider">Speed:</label>
			<input
				type="range"
				id="speed-slider"
				min="1"
				max="200"
				value="100"
			>
			<span id="speed-label">100 / 200</span>
		</div>

		<script src="script.js"></script>
	</body>
</html>
