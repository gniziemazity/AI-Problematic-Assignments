<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lesson</title>

<style>

#container {
    display: grid;
    grid-template-columns: repeat(25, 60px); /* 25 columns */
    gap: 5px;
    justify-content: center;
}
canvas {
    width: 60px;
    height: 60px;
    border: 1px solid;
}
</style>
</head>

<body>
<h1 style="text-align: center;">Animal Grid</h1>
    
<div id="info">
    <h3>My first Emmet abbreviations:</h3>
    <ol>
        <li>! (HTML boilerplate)</li>
        <li>div#container (div with id)</li>
        <li>ol>li*3 (ordered list with 3 items)</li>
    </ol>
    (all followed by Tab / Enter)
</div>

<div id="container"></div>

    <script src="https://www.radufromfinland.com/dog.js"></script>
    <script src="cat.js"></script>
    <audio id="dogSound" src="dog.mp3"></audio>
    <audio id="catSound" src="cat.mp3"></audio>
    <script>
        

        myNumber = 25.2; // never define without const, let (or var)
        console.log(myNumber);

        const myString = "I study at Academy";
        console.log(myString);

        let myBoolean = true;
        var oppositeBoolean = !myBoolean; // var was "replaced" by let and const
        console.log(myBoolean, oppositeBoolean); // accepts multiple parameters
        myBoolean = false;
        oppositeBoolean = !myBoolean;
        console.log(myBoolean, oppositeBoolean);

        console.log(!42, !"ABC", ![]);
        console.log(!null, !undefined, !0); // zero is "falsy"

        // arrays are like Python lists
        const myArray = [1, 2, 3, "Academy", true, null];
        myArray.length = 0;
        myArray[0] = 9;
        myArray[1] = 8;
        myArray[2] = 7;
        // myArray = [1, 2, 3]; ERROR! Program would fail here!
        try {
            myArray = [1, 2, 3];
        } catch(err) {
            console.error(err);
        }
        myArray.push(6);
        myArray.push(11);
        myArray.sort(function(a, b){ return a - b; });
        console.log(myArray);

        // objects are like Python dictionaries
        const dog = {
            name: "Max",
            age: 5,
            furr: "black",
            eyes: "brown"
        };
        console.log(dog);
        console.table(dog);
        console.log(dog.name);
        dog.name = "Charlie";
        console.log(dog["name"]);

        const anotherDog = new Dog("Rex", 7, "brown", "black");
        console.log(anotherDog);
        anotherDog.talk();
        const canvas = anotherDog.render();
        container.appendChild(canvas); /*
            no need for document.getElementById("container")
            ids that are valid JS names are automatically global variables
            invalid names:
             * start with a number
             * contain spaces or special characters (like -)
        */
       

        let a = 5;
        let b = 2;
        // operators
        console.log(a + b);
        a = "5";
        console.log(a + b); // concatenation
        console.log(a - b);
        console.log(a * b);
        console.log(a / b);
        console.log(a % b);
        console.log(a ** b);
        console.log(Math.pow(a, b));
        console.log(Math.sqrt(b));
        console.log(Math.pow(b, 0.5));
        console.log(b ** 0.5);

        a = Number(a) + 5;
        console.log(a);
        a += 5;
        a *= 2;
        a /= 3;
        a %= 4;
        a **= 10;
        console.log(a);

        const s1 = "Welcome to Academy!";
        const s2 = 'Welcome to "Academy"!';
        const s3 = "Welcome to \"Academy\"!"; // escaping with \
        console.log(s1, s2, s3);

        const age = 36;
        console.log("I am " + age + " years old");
        console.log(`I am ${age} years old`); // template literal

        let today = new Date();
        console.log(today);
        let someDate = new Date("August 24, 2025");
        console.log(someDate);

        console.log(today.getDay());
        switch (today.getDay()) {
            case 1: console.log("Monday"); break;
            case 2: console.log("Tuesday"); break;
            case 3: console.log("Wednesday"); break;
            case 4: console.log("Thursday"); break;
            case 5: console.log("Friday"); break;
            default: console.log("Weekend"); break;
        }
    </script>
    <script>
    const myCat = new Cat("Milo", 3, "gray", "black");
    myCat.talk();
    const catCanvas = myCat.render();
    container.appendChild(catCanvas);
/*

       // variant 1 (2nd question)
fetch("https://radufromfinland.com/animals/") // send request to API
    .then(function(response) { // when response arrives
        return response.json(); // convert response to JSON
    })
    .then(function(data) { // when JSON data is ready
        console.log(data); // print data to console
    })
    .catch(function(err) { // if error happens
        console.error(err); // print error
    })
*/


// variant 2 (used) 
async function fetchData() { // define async function
    try {
        const response = await fetch("https://radufromfinland.com/animals/"); // wait for API response
        const data = await response.json(); // convert to JSON

        container.innerHTML = ""; // clear container

        for (let i = 0; i < 100; i++) { // loop 100 times

            const randomAnimal = data[Math.floor(Math.random() * data.length)]; // pick random item

            let animal;

            
            if (Math.random() < 0.5) { 
                animal = new Dog(
                    randomAnimal.name,
                    randomAnimal.age,
                    randomAnimal.furr,
                    randomAnimal.eyes
                );
            } else {
                animal = new Cat(
                    randomAnimal.name,
                    randomAnimal.age,
                    randomAnimal.furr,
                    randomAnimal.eyes
                );
            }

            const canvas = animal.render(); // draw animal

            //onclick function - 3rd question
    canvas.onclick= function() {
        animal.talk();

        if (animal instanceof Dog) {
            const sound = document.getElementById("dogSound");
            sound.currentTime = 0;
            sound.play();
        } else {
            const sound = document.getElementById("catSound");
            sound.currentTime = 0;
            sound.play();
        }
    };

            container.appendChild(canvas); // add to grid
        }

    } catch(err) { // handle errors
        console.error(err); // print error
    }
}

fetchData(); // call function
</script>
</body>
</html>
