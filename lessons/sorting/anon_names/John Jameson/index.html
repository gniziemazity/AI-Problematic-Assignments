           function bubbleSort(arr) {
               do {
                   var swapped = false;
                   for (let i = 1; i < arr.length; i++) {
                        if (arr[i - 1] > arr[i]) {
                            const aux = arr[i - 1];
                            arr[i - 1] = arr[i];
                            arr[i] = aux;
                            swapped = true;
                        }
                   }
               } while (swapped);
            }
