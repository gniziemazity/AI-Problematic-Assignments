<!DOCTYPE html>
<html>
<head>
    <title>Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #chess-board {
            width: 480px;
            height: 480px;
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 4px solid #333;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .light { background-color: green; }  /* chess beige */
        .dark  { background-color: yellow; }  /* chess brown */

        .cell:hover {
            filter: brightness(110%);
        }

        img {
            width: 75%;
            pointer-events: none;
            user-select: none;
        }

        .invert-color {
            filter: invert(100%);
        }
    </style>
</head>

<body>

<h1>Chess Game</h1>

<div id="chess-board"></div>

<script>
    const board = document.getElementById("chess-board");

    const backRow = ["r","n","b","q","k","b","n","r"];

    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {

            const cell = document.createElement("div");
            cell.classList.add("cell");

            if ((row + col) % 2 === 0) {
                cell.classList.add("light");
            } else {
                cell.classList.add("dark");
            }

            // Black pieces
            if (row === 0) addPiece(cell, backRow[col], true);
            if (row === 1) addPiece(cell, "p", true);

            // White pieces
            if (row === 6) addPiece(cell, "p", false);
            if (row === 7) addPiece(cell, backRow[col], false);

            board.appendChild(cell);
        }
    }

    function addPiece(cell, piece, isBlack) {
        const img = document.createElement("img");
        img.src = "pieces/" + piece + ".png";

        if (isBlack) {
            img.classList.add("invert-color");
        }

        cell.appendChild(img);
    }

    // Click-to-move logic
    let selectedPiece = null;
    const cells = document.getElementsByClassName("cell");

    for (const cell of cells) {
        cell.onclick = function () {
            handleClick(cell);
        };
    }

    function handleClick(element) {

        for (const cell of cells) {
            cell.style.outline = "";
        }

        if (selectedPiece != null) {
            element.replaceChildren(selectedPiece);
            selectedPiece = null;
        } 
        else if (element.children.length > 0) {
            selectedPiece = element.children[0];
            element.style.outline = "4px solid red";
        }
    }
</script>

</body>
</html>
