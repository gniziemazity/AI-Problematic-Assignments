<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Assignments</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			body {
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
				background: var(--clr-page);
			}

			#toolbar button {
				padding: 2px 10px;
				border: 1px solid var(--clr-border-strong);
				border-radius: 3px;
				background: var(--clr-bg);
				color: var(--clr-label);
				cursor: pointer;
				font-size: 11px;
				font-family: inherit;
				transition: 0.12s;
				text-transform: capitalize;
			}

			#toolbar button.active {
				background: var(--clr-accent);
				color: var(--clr-bg);
				border-color: var(--clr-accent);
			}

			#toolbar button:hover:not(.active):not(:disabled) {
				background: var(--clr-accent-light);
				border-color: var(--clr-accent);
				color: var(--clr-accent);
			}

			#toolbar button:disabled {
				opacity: 0.4;
				cursor: default;
			}

			#main {
				display: flex;
				flex: 1;
				min-height: 0;
				overflow: hidden;
			}

			.pane {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
				background: var(--clr-bg);
			}

			.pane + .pane {
				border-left: 2px solid var(--clr-border);
			}

			.pane-label {
				padding: 3px 10px;
				font-size: 11px;
				font-weight: 700;
				color: var(--clr-label);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				background: var(--clr-surface);
				border-bottom: 1px solid var(--clr-border);
				flex-shrink: 0;
				user-select: none;
			}

			#preview-frame {
				flex: 1;
				border: none;
				width: 100%;
			}

			#no-assignment {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--clr-muted);
				font-size: 14px;
			}

			#code-scroll {
				flex: 1;
				overflow: auto;
			}

			#code-block {
				margin: 0;
				padding: 14px 16px;
				font-size: 12px;
				font-family: Consolas, "Courier New", monospace;
				white-space: pre;
				color: var(--clr-text);
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div id="toolbar" class="app-toolbar">
			<span
				style="
					font-size: 11px;
					color: var(--clr-label);
					white-space: nowrap;
					margin-right: 4px;
				"
				>Assignment:</span
			>
			<div id="assignment-tabs" style="display: flex; gap: 4px"></div>
			<div class="sep"></div>
			<button id="submissions-btn" disabled>Show Submissions</button>
		</div>

		<div id="main">
			<div class="pane" id="preview-pane">
				<div class="pane-label">Preview</div>
				<iframe id="preview-frame" style="display: none"></iframe>
				<div id="no-assignment">Select an assignment</div>
			</div>
			<div class="pane" id="code-pane">
				<div class="pane-label">Code</div>
				<div id="code-scroll">
					<pre id="code-block"></pre>
				</div>
			</div>
		</div>

		<script src="diff-utils.js"></script>
		<script src="assignments.js"></script>
	</body>
</html>
